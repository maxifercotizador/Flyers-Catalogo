<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Catálogo · MAXIFER</title>
<style>
:root {
  --azul: #1a3a7a;
  --azul-mid: #2151a8;
  --naranja: #e8510a;
  --verde: #1a9e5e;
  --rojo: #dc2626;
  --bg: #0f172a;
  --surface: #1e293b;
  --surface2: #263347;
  --surface3: #2f3f58;
  --border: #334155;
  --text: #e2e8f0;
  --muted: #94a3b8;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

.top-bar {
  background: var(--azul); padding: 12px 20px;
  display: flex; align-items: center; gap: 14px;
  position: sticky; top: 0; z-index: 200;
  box-shadow: 0 2px 16px rgba(0,0,0,0.5); flex-wrap: wrap;
}
.top-bar h1 { font-size: 17px; font-weight: 700; flex: 1; }
.top-bar h1 span { color: var(--naranja); }
.top-stats { display: flex; gap: 10px; flex-wrap: wrap; }
.stat-pill { padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; white-space: nowrap; }
.stat-total { background: #1e3a5f; color: #93c5fd; }
.stat-ok    { background: #14532d; color: #4ade80; }
.stat-miss  { background: #7f1d1d; color: #fca5a5; }

.toolbar {
  background: var(--surface); padding: 10px 20px;
  display: flex; gap: 10px; align-items: center;
  flex-wrap: wrap; border-bottom: 1px solid var(--border);
}
.btn {
  padding: 8px 16px; border-radius: 8px; border: none;
  font-size: 13px; font-weight: 600; cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
  display: inline-flex; align-items: center; gap: 6px; white-space: nowrap;
}
.btn:active { transform: scale(0.97); }
.btn:hover { opacity: 0.85; }
.btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none !important; }
.btn-naranja { background: var(--naranja); color: white; }
.btn-verde   { background: var(--verde); color: white; }
.btn-azul    { background: var(--azul-mid); color: white; }
.btn-outline { background: transparent; color: var(--text); border: 1.5px solid var(--border); }
.btn-rojo    { background: #7f1d1d; color: #fca5a5; }

.filter-wrap { display: flex; gap: 6px; margin-left: auto; flex-wrap: wrap; }
.filter-btn {
  padding: 6px 14px; border-radius: 20px;
  border: 1.5px solid var(--border); background: transparent;
  color: var(--muted); font-size: 12px; font-weight: 600;
  cursor: pointer; transition: all 0.15s; white-space: nowrap;
}
.filter-btn.active { background: var(--azul); border-color: var(--azul); color: white; }
.filter-btn.f-miss.active { background: var(--rojo); border-color: var(--rojo); color: white; }

.main { padding: 20px; max-width: 1400px; margin: 0 auto; }

.group-section { margin-bottom: 8px; }
.group-header {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; background: var(--surface2);
  border-radius: 10px; cursor: pointer; user-select: none;
  margin-bottom: 2px; border: 1px solid var(--border);
  transition: background 0.15s;
}
.group-header:hover { background: var(--surface3); }
.group-label { font-size: 12px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); flex: 1; }
.group-count { font-size: 12px; color: var(--muted); }
.group-arrow { font-size: 14px; color: var(--muted); transition: transform 0.2s; display: inline-block; }
.group-arrow.open { transform: rotate(90deg); }
.group-body { display: none; }
.group-body.open {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
  gap: 12px; padding: 12px 0;
}

.surtido-card {
  background: var(--surface); border-radius: 12px;
  border: 1.5px solid var(--border); overflow: hidden; transition: border-color 0.2s;
}
.surtido-card.has-missing { border-color: #991b1b; }
.surtido-card.all-ok      { border-color: #166534; }
.surtido-card.is-new      { border-color: #1e4d8c; }

.card-header {
  padding: 9px 12px; background: var(--surface2);
  display: flex; align-items: center; gap: 8px;
}
.card-id { font-size: 10px; font-weight: 700; color: var(--muted); background: var(--bg); padding: 2px 7px; border-radius: 10px; flex-shrink: 0; }
.card-nombre { font-size: 12px; font-weight: 700; line-height: 1.3; flex: 1; min-width: 0; }
.card-badge { font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 10px; flex-shrink: 0; white-space: nowrap; }
.badge-ok   { background: #14532d; color: #4ade80; }
.badge-miss { background: #7f1d1d; color: #fca5a5; }
.badge-new  { background: #1e3a5f; color: #93c5fd; }

.card-actions {
  display: flex; gap: 6px; padding: 8px 12px;
  background: var(--bg); border-bottom: 1px solid var(--border);
}
.card-actions .btn { padding: 5px 10px; font-size: 11px; flex: 1; justify-content: center; }

.card-slots { padding: 10px; display: flex; flex-direction: column; gap: 7px; }

/* ── IMG SLOT ── */
.img-slot {
  display: flex; gap: 8px; align-items: center;
  padding: 7px 9px; border-radius: 7px;
  border: 1.5px dashed var(--border);
  background: var(--bg); cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  position: relative;
}
.img-slot.has-img   { border-style: solid; border-color: #1e4d2b; background: #0d2318; }
.img-slot.missing   { border-color: #7f1d1d; background: #1c0a0a; animation: pulse-miss 2s ease-in-out infinite; }
.img-slot.drag-over { border-color: var(--naranja) !important; border-style: solid !important; background: #1f0f06 !important; animation: none !important; }
.img-slot.slot-dragging { opacity: 0.4; }
@keyframes pulse-miss { 0%,100% { border-color: #7f1d1d; } 50% { border-color: #dc2626; } }
.img-slot:hover { border-color: var(--naranja); }

/* hint Ctrl+V visible cuando slot activo */
.slot-paste-hint {
  display: none;
  position: absolute; top: 2px; right: 36px;
  font-size: 10px; color: var(--naranja); font-weight: 700;
  pointer-events: none;
}
.img-slot.slot-focus .slot-paste-hint { display: block; }
.img-slot.slot-focus { border-color: var(--naranja) !important; border-style: solid !important; animation: none !important; }

.slot-thumb { width: 48px; height: 36px; border-radius: 5px; object-fit: cover; flex-shrink: 0; cursor: zoom-in; }
.slot-thumb-empty { width: 48px; height: 36px; border-radius: 5px; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; color: var(--muted); }
/* thumb draggable */
.slot-thumb[draggable="true"] { cursor: grab; }
.slot-thumb[draggable="true"]:active { cursor: grabbing; }

.slot-info { flex: 1; min-width: 0; }
.slot-label { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
.slot-filename { font-size: 11px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
.slot-filename.empty { color: var(--rojo); font-style: italic; }
.slot-actions { display: flex; gap: 3px; flex-shrink: 0; }
.slot-btn { padding: 4px 7px; border-radius: 5px; border: none; font-size: 11px; cursor: pointer; font-weight: 600; }
.slot-btn:hover { opacity: 0.8; }
.btn-slot-cam { background: var(--azul-mid); color: white; }
.btn-slot-rm  { background: #7f1d1d; color: #fca5a5; }

/* MODALES */
.overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.85); z-index: 400;
  align-items: center; justify-content: center; padding: 16px;
}
.overlay.open { display: flex; }
.modal-box {
  background: var(--surface); border-radius: 14px;
  border: 1.5px solid var(--border);
  width: 100%; max-width: 540px;
  max-height: 90vh; overflow-y: auto;
  padding: 22px; display: flex; flex-direction: column; gap: 16px;
}
.modal-box h2 { font-size: 17px; font-weight: 700; }
.modal-box h2 span { color: var(--naranja); }
.modal-row { display: flex; flex-direction: column; gap: 5px; }
.modal-row label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
.modal-input, .modal-select {
  background: var(--bg); border: 1.5px solid var(--border);
  border-radius: 8px; color: var(--text); font-family: inherit;
  font-size: 14px; padding: 9px 12px; width: 100%;
  outline: none; transition: border-color 0.15s;
}
.modal-input:focus, .modal-select:focus { border-color: var(--naranja); }
.modal-select option { background: var(--surface); }
.modal-hint { font-size: 11px; color: var(--muted); }
.modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 4px; }
.modal-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

.incluye-list { display: flex; flex-direction: column; gap: 6px; }
.incluye-item { display: flex; gap: 6px; align-items: center; }
.incluye-item .modal-input { margin: 0; }
.btn-rm-item { background: #7f1d1d; color: #fca5a5; border: none; border-radius: 6px; padding: 5px 9px; cursor: pointer; font-size: 13px; flex-shrink: 0; }
.btn-add-item { background: transparent; border: 1.5px dashed var(--border); color: var(--muted); border-radius: 8px; padding: 7px; cursor: pointer; font-size: 12px; font-weight: 600; width: 100%; margin-top: 2px; transition: border-color 0.15s, color 0.15s; }
.btn-add-item:hover { border-color: var(--naranja); color: var(--naranja); }

.confirm-box { max-width: 360px; text-align: center; }
.confirm-box p { font-size: 13px; color: var(--muted); line-height: 1.6; }
.confirm-footer { display: flex; gap: 10px; justify-content: center; }

/* PREVIEW */
.preview-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.93); z-index: 600; align-items: center; justify-content: center; flex-direction: column; gap: 12px; }
.preview-overlay.open { display: flex; }
.preview-overlay img { max-width: 90vw; max-height: 78vh; border-radius: 10px; object-fit: contain; }
.preview-overlay p { font-size: 12px; color: var(--muted); }
.preview-close { position: absolute; top: 14px; right: 16px; background: rgba(255,255,255,0.12); border: none; color: white; font-size: 20px; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; }

/* TOAST */
.toast {
  position: fixed; bottom: 80px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--surface); border: 1.5px solid var(--verde);
  color: #4ade80; padding: 9px 18px; border-radius: 10px;
  font-size: 13px; font-weight: 600; opacity: 0;
  transition: opacity 0.3s, transform 0.3s;
  z-index: 999; white-space: nowrap; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.error { border-color: var(--rojo); color: #fca5a5; }

/* FAB */
.fab-wrap { position: fixed; bottom: 18px; right: 18px; display: flex; flex-direction: column; gap: 8px; align-items: flex-end; z-index: 300; }
.fab { padding: 11px 18px; border-radius: 50px; border: none; font-size: 13px; font-weight: 700; cursor: pointer; box-shadow: 0 4px 20px rgba(0,0,0,0.5); transition: transform 0.15s, opacity 0.15s; white-space: nowrap; display: flex; align-items: center; gap: 8px; }
.fab:hover { transform: scale(1.04); }
.fab:active { transform: scale(0.97); }
.fab:disabled { opacity: 0.35; cursor: not-allowed; transform: none !important; }
.fab-html { background: var(--naranja); color: white; }
.fab-zip  { background: var(--azul-mid); color: white; }
.changes-pill { background: rgba(0,0,0,0.25); padding: 2px 8px; border-radius: 10px; font-size: 11px; }

.empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 260px; gap: 14px; color: var(--muted); }
.loading-wrap { display: flex; align-items: center; justify-content: center; min-height: 300px; flex-direction: column; gap: 16px; color: var(--muted); }
.spinner { width: 38px; height: 38px; border: 3px solid var(--border); border-top-color: var(--naranja); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

/* hint global paste */
.paste-indicator {
  position: fixed; top: 70px; left: 50%;
  transform: translateX(-50%);
  background: var(--naranja); color: white;
  padding: 6px 16px; border-radius: 20px;
  font-size: 12px; font-weight: 700;
  opacity: 0; transition: opacity 0.3s;
  pointer-events: none; z-index: 500;
}
.paste-indicator.show { opacity: 1; }

@media (max-width: 600px) {
  .group-body.open { grid-template-columns: 1fr; }
  .fab { font-size: 12px; padding: 9px 14px; }
  .modal-row-2 { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div class="top-bar">
  <h1>Admin Catálogo · <span>MAXIFER</span></h1>
  <div class="top-stats">
    <span class="stat-pill stat-total" id="statTotal">—</span>
    <span class="stat-pill stat-ok"    id="statOk">—</span>
    <span class="stat-pill stat-miss"  id="statMiss">—</span>
  </div>
</div>

<div class="toolbar">
  <label class="btn btn-outline" style="cursor:pointer">
    📂 Cargar HTML
    <input type="file" id="inputHtml" accept=".html" style="display:none" onchange="cargarHTML(this)">
  </label>
  <button class="btn btn-verde" id="btnNuevo" onclick="abrirModalNuevo()" disabled>＋ Nuevo surtido</button>
  <div class="filter-wrap">
    <button class="filter-btn active" onclick="setFiltro('todos',this)">Todos</button>
    <button class="filter-btn f-miss"  onclick="setFiltro('faltantes',this)">Solo faltantes</button>
    <button class="filter-btn"        onclick="setFiltro('completos',this)">Solo completos</button>
  </div>
</div>

<div class="paste-indicator" id="pasteIndicator">📋 Pegando imagen en slot activo...</div>

<div class="main" id="main">
  <div class="loading-wrap">
    <div class="spinner"></div>
    <div>Cargá el <strong>catalogo_actualizado.html</strong> para comenzar</div>
  </div>
</div>

<div class="fab-wrap">
  <button class="fab fab-html" id="fabHTML" onclick="descargarHTML()" disabled>
    ⬇ Descargar HTML <span class="changes-pill" id="changesCount">0 cambios</span>
  </button>
  <button class="fab fab-zip" id="fabZIP" onclick="descargarZIP()" disabled>
    📦 Descargar imágenes (.webp)
  </button>
</div>

<!-- MODAL NUEVO / EDITAR -->
<div class="overlay" id="overlayForm">
  <div class="modal-box">
    <h2 id="formTitulo">Nuevo surtido</h2>
    <div class="modal-row">
      <label>Nombre del surtido *</label>
      <input class="modal-input" id="fNombre" type="text" placeholder="Ej: Resortes Línea Ferretera">
    </div>
    <div class="modal-row-2">
      <div class="modal-row">
        <label>Código *</label>
        <input class="modal-input" id="fCodigo" type="text" placeholder="Ej: RES. LF">
      </div>
      <div class="modal-row">
        <label>Grupo / Categoría</label>
        <select class="modal-select" id="fGrupo">
          <option value="clips">Clips Plásticos</option>
          <option value="resortes">Resortes</option>
          <option value="oring">Anillos O'Ring</option>
          <option value="chavetas">Chavetas</option>
          <option value="aluminio">Conexiones Aluminio y Plásticas</option>
          <option value="neumaticas">Conexiones Neumáticas y Bronce</option>
          <option value="arandelas">Arandelas de Goma</option>
          <option value="terminales">Terminales</option>
          <option value="carbones">Carbones</option>
          <option value="perillas">Perillas de Cocina</option>
          <option value="otros">Otros</option>
        </select>
      </div>
    </div>
    <div class="modal-row">
      <label>¿Qué incluye?</label>
      <div class="incluye-list" id="incluyeList"></div>
      <button class="btn-add-item" onclick="addIncluyeItem()">+ Agregar línea</button>
      <span class="modal-hint">Ej: "1 exhibidor con su protector", "4 gavetas codificadas", "Libre reposición"</span>
    </div>
    <div class="modal-row-2">
      <div class="modal-row">
        <label>Cant. uniforme</label>
        <input class="modal-input" id="fCantUniforme" type="text" placeholder="Ej: 4 piezas de c/u">
      </div>
      <div class="modal-row">
        <label>Precio (BD)</label>
        <input class="modal-input" id="fPrecio" type="number" value="0" min="0">
      </div>
    </div>
    <div class="modal-row">
      <label>Piezas totales (BD)</label>
      <input class="modal-input" id="fPiezas" type="number" value="0" min="0">
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="cerrarModalForm()">Cancelar</button>
      <button class="btn btn-naranja" onclick="guardarSurtido()">💾 Guardar</button>
    </div>
  </div>
</div>

<!-- MODAL CONFIRMAR ELIMINAR -->
<div class="overlay" id="overlayConfirm">
  <div class="modal-box confirm-box">
    <div style="font-size:40px">⚠️</div>
    <h2>Eliminar surtido</h2>
    <p id="confirmMsg"></p>
    <div class="confirm-footer">
      <button class="btn btn-outline" onclick="cerrarConfirm()">Cancelar</button>
      <button class="btn btn-rojo"    onclick="confirmarEliminar()">🗑️ Eliminar</button>
    </div>
  </div>
</div>

<!-- PREVIEW -->
<div class="preview-overlay" id="previewOverlay" onclick="cerrarPreview()">
  <button class="preview-close" onclick="cerrarPreview()">✕</button>
  <img id="previewImg" src="" alt="">
  <p id="previewInfo"></p>
</div>

<input type="file" id="inputFile" accept="image/*" style="display:none">
<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════════════════════
// ESTADO
// ══════════════════════════════════════════════════════════════
let htmlOriginal = '';
let surtidos = [];
let cambiosImg = {};           // ckImg(id,campo) → { dataUrl, nombre, ruta, esExterno }
let surtidosEliminados = new Set();
let surtidosNuevos = new Set();
let surtidosEditados = new Set();
let filtroActual = 'todos';
let editandoId = null;
let pendingEliminarId = null;
let incluyeCounter = 0;

// Slot activo para Ctrl+V y drag interno
let slotFoco = null;           // { sId, campo } — slot seleccionado para pegar
let dragOrigen = null;         // { sId, campo, dataUrl, nombre, ruta, esExterno }

const TIPOS_SLOT = [
  { key: 'foto_card',      label: 'Card (portada)', emoji: '🖼️' },
  { key: 'foto_exhibidor', label: 'Exhibidor',      emoji: '🏪' },
  { key: 'foto_gavetas',   label: 'Gavetas',        emoji: '📦' },
];

const GRUPOS_DEF = [
  { key: 'clips',      label: '🔩 Clips Plásticos',                 codigos: ['PL CH.','PL Nac. 160 M.','CL. IMP COM'] },
  { key: 'resortes',   label: '🌀 Resortes',                        codigos: ['RES. LF','RES. LC','RES. LB','RES. LA','RES. LP','RES. COMP.'] },
  { key: 'oring',      label: "⭕ Anillos O'Ring",                  codigos: ['OR. CH.','OR. GR.','OR. COMP.'] },
  { key: 'chavetas',   label: '📌 Chavetas',                        codigos: ['CHA. PART.','CHA. CH.','GA+CH COMP.'] },
  { key: 'aluminio',   label: '🔧 Conexiones Aluminio y Plásticas', codigos: ['CONEX. ALUM. 1','CONEX. ALUM. 2','Conex. Alum. L. Temp.','Conex. Alum. Mayor Rot.','CONC. PL'] },
  { key: 'neumaticas', label: '💨 Conexiones Neumáticas y Bronce',  codigos: ['CON. NEU.','CON. NEU. COMPL.','CON. NEU. NUEV.','BRONCE','RAC. CH.','RAC. GR.'] },
  { key: 'arandelas',  label: '🔘 Arandelas de Goma',               codigos: ['ARAND. CH.','ARAND. LP.','ARAN. CO-FI-AL','ARAND. INYEC.'] },
  { key: 'terminales', label: '⚡ Terminales',                      codigos: ['TERM. CH.','TERM. NU.','TEM. COMP.'] },
  { key: 'carbones',   label: '🔋 Carbones',                        codigos: ['CARB. 1','CARB. COMPL.'] },
  { key: 'perillas',   label: '🎛️ Perillas de Cocina',              codigos: ['PER. 1','PER. 2','PER. COMP.'] },
  { key: 'otros',      label: '📦 Otros',                           codigos: [] },
];

// ══════════════════════════════════════════════════════════════
// CARGAR HTML
// ══════════════════════════════════════════════════════════════
function cargarHTML(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    htmlOriginal = e.target.result;
    try {
      parsearSurtidos();
      cambiosImg = {}; surtidosEliminados = new Set();
      surtidosNuevos = new Set(); surtidosEditados = new Set();
      document.getElementById('btnNuevo').disabled = false;
      renderPanel();
      toast('✅ ' + surtidos.length + ' surtidos cargados');
    } catch(err) { toast('❌ ' + err.message, true); }
  };
  reader.readAsText(file, 'utf-8');
}

function parsearSurtidos() {
  const match = htmlOriginal.match(/const SURTIDOS\s*=\s*(\[[\s\S]*?\]);\s*\n/);
  if (!match) throw new Error('No se encontró SURTIDOS en el HTML');
  surtidos = Function('"use strict"; return (' + match[1] + ')')();
  surtidos = surtidos.map(s => Object.assign({}, s));
}

// ══════════════════════════════════════════════════════════════
// RENDER
// ══════════════════════════════════════════════════════════════
function renderPanel() {
  const main = document.getElementById('main');
  const grupos = agruparSurtidos();
  const visibles = grupos.filter(g => filtrar(g.items).length > 0);

  if (!visibles.length) {
    main.innerHTML = '<div class="empty-state"><div style="font-size:48px">🔎</div><div>Sin resultados</div></div>';
    actualizarStats(); actualizarFabs(); return;
  }

  main.innerHTML = visibles.map((g, gi) => {
    const items = filtrar(g.items);
    const nMiss = items.filter(tieneFaltantes).length;
    const infoMiss = nMiss ? ` · <span style="color:#fca5a5">⚠ ${nMiss} incompletos</span>` : '';
    return `
      <div class="group-section">
        <div class="group-header" onclick="toggleGrupo('gb${gi}','ga${gi}')">
          <span class="group-label">${g.label}</span>
          <span class="group-count">${items.length} surtidos${infoMiss}</span>
          <span class="group-arrow open" id="ga${gi}">›</span>
        </div>
        <div class="group-body open" id="gb${gi}">
          ${items.map(s => renderCard(s)).join('')}
        </div>
      </div>`;
  }).join('');

  actualizarStats(); actualizarFabs();
}

function toggleGrupo(bId, aId) {
  document.getElementById(bId).classList.toggle('open');
  document.getElementById(aId).classList.toggle('open');
}

function renderCard(s) {
  const falta   = tieneFaltantes(s);
  const esNuevo = surtidosNuevos.has(s.id);
  const clase   = esNuevo ? 'is-new' : (falta ? 'has-missing' : 'all-ok');
  const badge   = esNuevo
    ? '<span class="card-badge badge-new">★ Nuevo</span>'
    : (falta ? '<span class="card-badge badge-miss">⚠ Incompleto</span>'
             : '<span class="card-badge badge-ok">✓ OK</span>');
  return `
    <div class="surtido-card ${clase}" id="card-${s.id}">
      <div class="card-header">
        <span class="card-id">S${s.id}</span>
        <span class="card-nombre">${esc(s.nombre)}<br>
          <small style="color:var(--muted);font-weight:400;font-size:10px">${esc(s.codigo)}</small>
        </span>
        ${badge}
      </div>
      <div class="card-actions">
        <button class="btn btn-azul" onclick="abrirModalEditar(${s.id})">✏️ Editar info</button>
        <button class="btn btn-rojo" onclick="pedirEliminar(${s.id})">🗑️</button>
      </div>
      <div class="card-slots">${TIPOS_SLOT.map(t => renderSlot(s, t)).join('')}</div>
    </div>`;
}

function renderSlot(s, tipo) {
  const cambio = cambiosImg[ckImg(s.id, tipo.key)];
  const rutaOriginal = s[tipo.key] || '';
  const esperado = `s${s.id}_${tipo.key.replace('foto_', '')}.webp`;

  // Determinar qué mostrar
  let dataUrl = '', rutaMostrar = '', nombreMostrar = '', esExterno = false;
  if (cambio) {
    dataUrl = cambio.dataUrl;
    rutaMostrar = cambio.ruta;
    nombreMostrar = cambio.nombre;
    esExterno = cambio.esExterno;
  } else if (rutaOriginal) {
    rutaMostrar = rutaOriginal;
    nombreMostrar = rutaOriginal.replace('./img/', '');
    esExterno = true; // ya existe en GitHub
  }

  const tieneImagen = !!(cambio || rutaOriginal);
  const claseSlot = tieneImagen ? 'has-img' : 'missing';
  const esFoco = slotFoco && slotFoco.sId === s.id && slotFoco.campo === tipo.key;

  let thumb;
  if (tieneImagen) {
    const src = dataUrl || rutaOriginal;
    thumb = `<img class="slot-thumb" src="${src}"
      draggable="true"
      onerror="this.style.opacity='0.2'"
      onclick="previewImg('${src}','${esc(nombreMostrar)}');event.stopPropagation()"
      ondragstart="iniciarDragInterno(event,${s.id},'${tipo.key}')"
    >`;
  } else {
    thumb = `<div class="slot-thumb-empty">${tipo.emoji}</div>`;
  }

  const btnRm = tieneImagen
    ? `<button class="slot-btn btn-slot-rm" onclick="quitarImagen(${s.id},'${tipo.key}');event.stopPropagation()">✕</button>`
    : '';

  const labelColor = cambio && !esExterno ? 'color:#4ade80' : '';
  const labelTexto = tieneImagen
    ? `<span class="slot-filename" style="${labelColor}">${esc(nombreMostrar)}</span>`
    : `<span class="slot-filename empty">Falta · esperado: ${esperado}</span>`;

  return `
    <div class="img-slot ${claseSlot}${esFoco ? ' slot-focus' : ''}"
         id="slot-${s.id}-${tipo.key}"
         onclick="seleccionarSlot(event,${s.id},'${tipo.key}')"
         ondragover="slotDragOver(event,this)"
         ondragleave="slotDragLeave(this)"
         ondrop="slotDrop(event,${s.id},'${tipo.key}')">
      <span class="slot-paste-hint">Ctrl+V para pegar</span>
      ${thumb}
      <div class="slot-info">
        <div class="slot-label">${tipo.label}</div>
        ${labelTexto}
      </div>
      <div class="slot-actions" onclick="event.stopPropagation()">
        <button class="slot-btn btn-slot-cam" onclick="abrirSelectorImg(${s.id},'${tipo.key}')">📂</button>
        ${btnRm}
      </div>
    </div>`;
}

// ══════════════════════════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════════════════════════
function ckImg(id, campo) { return id + '_' + campo; }
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function setFiltro(f, btn) {
  filtroActual = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (surtidos.length) renderPanel();
}
function filtrar(items) {
  if (filtroActual === 'todos') return items;
  return items.filter(s => filtroActual === 'faltantes' ? tieneFaltantes(s) : !tieneFaltantes(s));
}
function agruparSurtidos() {
  const asignados = new Set();
  const resultado = [];
  for (const g of GRUPOS_DEF) {
    if (!g.codigos.length) continue;
    let items = surtidos.filter(s => !surtidosEliminados.has(s.id) && g.codigos.includes(s.codigo));
    const nuevosGrupo = surtidos.filter(s =>
      surtidosNuevos.has(s.id) && s._grupo === g.key && !items.find(x => x.id === s.id)
    );
    items = [...items, ...nuevosGrupo];
    items.forEach(s => asignados.add(s.id));
    if (items.length) resultado.push({ ...g, items });
  }
  const otros = surtidos.filter(s => !surtidosEliminados.has(s.id) && !asignados.has(s.id));
  if (otros.length) resultado.push({ key: 'otros', label: '📦 Otros', items: otros });
  return resultado;
}
function tieneFaltantes(s) {
  return TIPOS_SLOT.some(t => !getValorSlot(s, t.key));
}
function getValorSlot(s, key) {
  const ck = ckImg(s.id, key);
  if (cambiosImg[ck]) return cambiosImg[ck].ruta;
  return s[key] || '';
}
function actualizarCard(sId) {
  const s = surtidos.find(x => x.id === sId);
  const el = document.getElementById('card-' + sId);
  if (!s || !el) return;
  el.outerHTML = renderCard(s);
}
function actualizarStats() {
  const activos = surtidos.filter(s => !surtidosEliminados.has(s.id));
  const falt = activos.filter(tieneFaltantes).length;
  document.getElementById('statTotal').textContent = activos.length + ' surtidos';
  document.getElementById('statOk').textContent    = (activos.length - falt) + ' completos';
  document.getElementById('statMiss').textContent  = falt + ' incompletos';
}
function actualizarFabs() {
  const nc = Object.keys(cambiosImg).length + surtidosEliminados.size + surtidosNuevos.size + surtidosEditados.size;
  document.getElementById('changesCount').textContent = nc + (nc === 1 ? ' cambio' : ' cambios');
  document.getElementById('fabHTML').disabled = !htmlOriginal;
  // ZIP: solo imágenes nuevas (no externas)
  const hayNuevas = Object.values(cambiosImg).some(c => !c.esExterno);
  document.getElementById('fabZIP').disabled = !hayNuevas;
}

// ══════════════════════════════════════════════════════════════
// SELECCIÓN DE SLOT (para Ctrl+V)
// ══════════════════════════════════════════════════════════════
function seleccionarSlot(event, sId, campo) {
  // Si viene de un botón interno, no hacer nada
  if (event.target.closest('.slot-actions') || event.target.closest('.slot-btn')) return;
  // Si hacen clic en la imagen → preview, no seleccionar
  if (event.target.tagName === 'IMG' && event.target.classList.contains('slot-thumb')) return;

  // Deseleccionar anterior
  if (slotFoco) {
    const prevEl = document.getElementById(`slot-${slotFoco.sId}-${slotFoco.campo}`);
    if (prevEl) prevEl.classList.remove('slot-focus');
  }
  slotFoco = { sId, campo };
  const el = document.getElementById(`slot-${sId}-${campo}`);
  if (el) el.classList.add('slot-focus');
}

// Clic fuera → deseleccionar
document.addEventListener('click', e => {
  if (!e.target.closest('.img-slot') && slotFoco) {
    const el = document.getElementById(`slot-${slotFoco.sId}-${slotFoco.campo}`);
    if (el) el.classList.remove('slot-focus');
    slotFoco = null;
  }
});

// ══════════════════════════════════════════════════════════════
// CTRL+V — PEGAR IMAGEN DEL PORTAPAPELES
// ══════════════════════════════════════════════════════════════
document.addEventListener('paste', async e => {
  if (!slotFoco) return;
  // Ignorar si hay un input/textarea activo
  const tag = document.activeElement.tagName;
  if (tag === 'INPUT' || tag === 'TEXTAREA') return;

  const items = e.clipboardData.items;
  for (const item of items) {
    if (item.type.startsWith('image/')) {
      e.preventDefault();
      const file = item.getAsFile();
      mostrarPasteIndicator();
      await procesarImagen(file, slotFoco.sId, slotFoco.campo);
      break;
    }
  }
});

function mostrarPasteIndicator() {
  const el = document.getElementById('pasteIndicator');
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1800);
}

// ══════════════════════════════════════════════════════════════
// SELECTOR DE ARCHIVO
// ══════════════════════════════════════════════════════════════
function abrirSelectorImg(sId, campo) {
  const inp = document.getElementById('inputFile');
  inp.value = '';
  inp.onchange = e => { if (e.target.files[0]) procesarImagen(e.target.files[0], sId, campo); };
  inp.click();
}

// ══════════════════════════════════════════════════════════════
// DRAG DESDE EXPLORADOR (archivos externos)
// ══════════════════════════════════════════════════════════════
function slotDragOver(e, el) {
  e.preventDefault();
  // Si viene drag interno → mostrar igual
  el.classList.add('drag-over');
}
function slotDragLeave(el) { el.classList.remove('drag-over'); }

function slotDrop(e, sId, campo) {
  e.preventDefault();
  const el = document.getElementById(`slot-${sId}-${campo}`);
  if (el) el.classList.remove('drag-over');

  // ¿Es drag interno (entre slots)?
  if (dragOrigen) {
    moverSlotInterno(sId, campo);
    return;
  }

  // Archivo externo desde explorador
  const f = e.dataTransfer.files[0];
  if (f && f.type.startsWith('image/')) procesarImagen(f, sId, campo);
}

// ══════════════════════════════════════════════════════════════
// DRAG INTERNO (mover imagen entre slots)
// ══════════════════════════════════════════════════════════════
function iniciarDragInterno(e, sId, campo) {
  const cambio = cambiosImg[ckImg(sId, campo)];
  const s = surtidos.find(x => x.id === sId);
  const rutaOriginal = s ? (s[campo] || '') : '';

  dragOrigen = {
    sId, campo,
    dataUrl: cambio ? cambio.dataUrl : null,
    nombre: cambio ? cambio.nombre : (rutaOriginal ? rutaOriginal.replace('./img/', '') : ''),
    ruta: cambio ? cambio.ruta : rutaOriginal,
    esExterno: cambio ? cambio.esExterno : true,
  };

  // Marcar slot origen visualmente
  const el = document.getElementById(`slot-${sId}-${campo}`);
  if (el) el.classList.add('slot-dragging');

  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', `${sId}|${campo}`); // fallback

  // Limpiar al terminar
  const thumbEl = e.target;
  thumbEl.addEventListener('dragend', () => {
    if (el) el.classList.remove('slot-dragging');
    dragOrigen = null;
  }, { once: true });
}

function moverSlotInterno(destSId, destCampo) {
  if (!dragOrigen) return;
  const { sId: origSId, campo: origCampo, dataUrl, nombre, ruta, esExterno } = dragOrigen;

  // Si es el mismo slot → nada
  if (origSId === destSId && origCampo === destCampo) { dragOrigen = null; return; }

  const sOrig = surtidos.find(x => x.id === origSId);
  const sDest = surtidos.find(x => x.id === destSId);
  if (!sOrig || !sDest) { dragOrigen = null; return; }

  // Guardar estado actual del destino antes de pisar
  const cambioDestPrev = cambiosImg[ckImg(destSId, destCampo)];
  const rutaDestPrev   = sDest[destCampo] || '';

  // ── Asignar origen → destino ──
  if (dataUrl) {
    // Imagen nueva (en memoria) → renombrar según slot destino
    const ext    = nombre.split('.').pop();
    const tipo   = destCampo.replace('foto_', '');
    const nuevoNombre = `s${destSId}_${tipo}.${ext}`;
    cambiosImg[ckImg(destSId, destCampo)] = {
      dataUrl, nombre: nuevoNombre, ruta: `./img/${nuevoNombre}`, esExterno: false
    };
    sDest[destCampo] = `./img/${nuevoNombre}`;
  } else {
    // Imagen externa (solo ruta) → apuntar al archivo existente tal cual
    delete cambiosImg[ckImg(destSId, destCampo)];
    sDest[destCampo] = ruta; // el HTML apuntará a esa ruta directamente
  }

  // ── Asignar estado previo del destino → origen (swap) ──
  if (cambioDestPrev) {
    const ext2  = cambioDestPrev.nombre.split('.').pop();
    const tipo2 = origCampo.replace('foto_', '');
    const nom2  = `s${origSId}_${tipo2}.${ext2}`;
    cambiosImg[ckImg(origSId, origCampo)] = {
      dataUrl: cambioDestPrev.dataUrl, nombre: nom2,
      ruta: `./img/${nom2}`, esExterno: false
    };
    sOrig[origCampo] = `./img/${nom2}`;
  } else if (rutaDestPrev) {
    delete cambiosImg[ckImg(origSId, origCampo)];
    sOrig[origCampo] = rutaDestPrev;
  } else {
    // Destino estaba vacío → origen queda vacío
    delete cambiosImg[ckImg(origSId, origCampo)];
    sOrig[origCampo] = '';
  }

  surtidosEditados.add(origSId);
  surtidosEditados.add(destSId);
  dragOrigen = null;

  actualizarCard(origSId);
  if (destSId !== origSId) actualizarCard(destSId);
  actualizarStats();
  actualizarFabs();
  toast('↔ Imágenes intercambiadas');
}

// ══════════════════════════════════════════════════════════════
// PROCESAR IMAGEN (archivo nuevo)
// ══════════════════════════════════════════════════════════════
function procesarImagen(file, sId, campo) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => {
      const ext    = file.name.split('.').pop().toLowerCase();
      const tipo   = campo.replace('foto_', '');
      const nombre = `s${sId}_${tipo}.${ext}`;
      cambiosImg[ckImg(sId, campo)] = {
        dataUrl: e.target.result, nombre, ruta: `./img/${nombre}`, esExterno: false
      };
      const s = surtidos.find(x => x.id === sId);
      if (s) s[campo] = `./img/${nombre}`;
      surtidosEditados.add(sId);
      actualizarCard(sId);
      actualizarStats();
      actualizarFabs();
      toast(`✅ ${nombre} asignada`);
      resolve();
    };
    reader.readAsDataURL(file);
  });
}

function quitarImagen(sId, campo) {
  delete cambiosImg[ckImg(sId, campo)];
  const s = surtidos.find(x => x.id === sId);
  if (s) s[campo] = '';
  surtidosEditados.add(sId);
  actualizarCard(sId);
  actualizarStats();
  actualizarFabs();
  toast('🗑️ Imagen quitada');
}

// MODAL NUEVO / EDITAR
// ══════════════════════════════════════════════════════════════
function abrirModalNuevo() {
  editandoId = null;
  document.getElementById('formTitulo').innerHTML = '＋ Nuevo surtido';
  document.getElementById('fNombre').value = '';
  document.getElementById('fCodigo').value = '';
  document.getElementById('fCantUniforme').value = '';
  document.getElementById('fPrecio').value = '0';
  document.getElementById('fPiezas').value = '0';
  document.getElementById('fGrupo').value = 'otros';
  iniciarIncluye(['1 exhibidor con su protector', '', 'Libre reposición']);
  document.getElementById('overlayForm').classList.add('open');
  setTimeout(() => document.getElementById('fNombre').focus(), 100);
}

function abrirModalEditar(sId) {
  editandoId = sId;
  const s = surtidos.find(x => x.id === sId);
  if (!s) return;
  document.getElementById('formTitulo').innerHTML = '✏️ Editar: <span>' + esc(s.nombre) + '</span>';
  document.getElementById('fNombre').value = s.nombre || '';
  document.getElementById('fCodigo').value = s.codigo || '';
  document.getElementById('fCantUniforme').value = s.cant_uniforme || '';
  document.getElementById('fPrecio').value = s.precio || 0;
  document.getElementById('fPiezas').value = s.piezas || 0;
  let grupoKey = s._grupo || 'otros';
  for (const g of GRUPOS_DEF) { if (g.codigos.includes(s.codigo)) { grupoKey = g.key; break; } }
  document.getElementById('fGrupo').value = grupoKey;
  iniciarIncluye(s.incluye || []);
  document.getElementById('overlayForm').classList.add('open');
}

function cerrarModalForm() { document.getElementById('overlayForm').classList.remove('open'); }

function iniciarIncluye(items) {
  incluyeCounter = 0;
  document.getElementById('incluyeList').innerHTML = '';
  items.forEach(v => addIncluyeItem(v));
}
function addIncluyeItem(val) {
  const i = incluyeCounter++;
  const div = document.createElement('div');
  div.className = 'incluye-item'; div.id = 'ii' + i;
  div.innerHTML = `<input class="modal-input" style="margin:0" placeholder="Ej: 4 gavetas codificadas" value="${esc(val||'')}"><button class="btn-rm-item" onclick="rmIncluyeItem(${i})">✕</button>`;
  document.getElementById('incluyeList').appendChild(div);
}
function rmIncluyeItem(i) { const el = document.getElementById('ii'+i); if (el) el.remove(); }
function getIncluyeItems() {
  return Array.from(document.getElementById('incluyeList').querySelectorAll('input'))
    .map(i => i.value.trim()).filter(Boolean);
}

function guardarSurtido() {
  const nombre = document.getElementById('fNombre').value.trim();
  const codigo = document.getElementById('fCodigo').value.trim();
  if (!nombre || !codigo) { toast('⚠ Completá nombre y código', true); return; }
  const incluye      = getIncluyeItems();
  const cantUniforme = document.getElementById('fCantUniforme').value.trim();
  const precio       = parseInt(document.getElementById('fPrecio').value) || 0;
  const piezas       = parseInt(document.getElementById('fPiezas').value) || 0;
  const grupoKey     = document.getElementById('fGrupo').value;

  if (editandoId !== null) {
    const s = surtidos.find(x => x.id === editandoId);
    if (s) { Object.assign(s, { nombre, codigo, incluye, cant_uniforme: cantUniforme, precio, piezas, _grupo: grupoKey }); surtidosEditados.add(editandoId); }
    cerrarModalForm(); renderPanel(); toast('✅ Surtido actualizado');
  } else {
    const nuevoId = Math.max(0, ...surtidos.map(x => x.id)) + 1;
    surtidos.push({ id: nuevoId, nombre, codigo, precio, piezas, foto_card: '', foto_exhibidor: '', foto_gavetas: '', incluye, tabla: null, cant_uniforme: cantUniforme, _grupo: grupoKey });
    surtidosNuevos.add(nuevoId);
    cerrarModalForm(); renderPanel(); actualizarFabs();
    toast('✅ Surtido S' + nuevoId + ' creado');
  }
}

// ══════════════════════════════════════════════════════════════
// ELIMINAR
// ══════════════════════════════════════════════════════════════
function pedirEliminar(sId) {
  const s = surtidos.find(x => x.id === sId);
  if (!s) return;
  pendingEliminarId = sId;
  document.getElementById('confirmMsg').innerHTML =
    `¿Eliminás <strong>${esc(s.nombre)}</strong> (S${sId})?<br>El cambio se aplica al descargar el HTML.`;
  document.getElementById('overlayConfirm').classList.add('open');
}
function cerrarConfirm() { document.getElementById('overlayConfirm').classList.remove('open'); pendingEliminarId = null; }
function confirmarEliminar() {
  if (pendingEliminarId === null) return;
  surtidosEliminados.add(pendingEliminarId);
  surtidosNuevos.delete(pendingEliminarId);
  surtidosEditados.delete(pendingEliminarId);
  TIPOS_SLOT.forEach(t => delete cambiosImg[ckImg(pendingEliminarId, t.key)]);
  cerrarConfirm(); renderPanel(); actualizarFabs();
  toast('🗑️ Surtido eliminado');
}

// TOAST
// ══════════════════════════════════════════════════════════════
function toast(msg, error = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast' + (error ? ' error' : '') + ' show';
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 2600);
}

// ══════════════════════════════════════════════════════════════
// DESCARGAR HTML
// ══════════════════════════════════════════════════════════════
function descargarHTML() {
  if (!htmlOriginal) return;
  const activos  = surtidos.filter(s => !surtidosEliminados.has(s.id));
  const serial   = serializarSurtidos(activos);
  const htmlNuevo = htmlOriginal.replace(
    /const SURTIDOS\s*=\s*\[[\s\S]*?\];\s*\n/,
    'const SURTIDOS = ' + serial + ';\n'
  );
  descargarBlob(htmlNuevo, 'catalogo_actualizado.html', 'text/html;charset=utf-8');
  toast('✅ catalogo_actualizado.html descargado');
}

function serializarSurtidos(arr) {
  return '[\n' + arr.map(s => {
    const { _grupo, ...clean } = s;
    const lineas = Object.entries(clean).map(([k, v]) => {
      if (v === null || v === undefined) return `    ${k}: null`;
      if (typeof v === 'number') return `    ${k}: ${v}`;
      if (typeof v === 'string') return `    ${k}: ${JSON.stringify(v)}`;
      if (Array.isArray(v)) {
        if (!v.length) return `    ${k}: []`;
        return `    ${k}: [${v.map(x => JSON.stringify(x)).join(', ')}]`;
      }
      return `    ${k}: ${JSON.stringify(v)}`;
    });
    return `  {\n${lineas.join(',\n')}\n  }`;
  }).join(',\n') + '\n]';
}

// ══════════════════════════════════════════════════════════════
// DESCARGAR ZIP con conversión a WebP
// ══════════════════════════════════════════════════════════════
async function descargarZIP() {
  const nuevas = Object.values(cambiosImg).filter(c => !c.esExterno);
  if (!nuevas.length) { toast('Sin imágenes nuevas para exportar', true); return; }

  toast('⏳ Convirtiendo a WebP...');

  if (typeof JSZip === 'undefined') await cargarScript('https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js');

  const zip    = new JSZip();
  const folder = zip.folder('img');

  for (const c of nuevas) {
    try {
      const webpBlob = await convertirAWebP(c.dataUrl);
      // Nombre siempre con extensión .webp
      const nombreWebp = c.nombre.replace(/\.[^.]+$/, '.webp');
      folder.file(nombreWebp, webpBlob);
    } catch {
      // Si la conversión falla, meter el original
      const res  = await fetch(c.dataUrl);
      const blob = await res.blob();
      folder.file(c.nombre, blob);
    }
  }

  const content = await zip.generateAsync({ type: 'blob' });
  const url = URL.createObjectURL(content);
  const a   = document.createElement('a');
  a.href = url; a.download = 'imagenes_nuevas_maxifer.zip'; a.click();
  URL.revokeObjectURL(url);
  toast('✅ ZIP con ' + nuevas.length + ' imagen(es) WebP descargado');
}

function convertirAWebP(dataUrl) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width  = img.width;
      canvas.height = img.height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);
      canvas.toBlob(blob => {
        if (blob) resolve(blob);
        else reject(new Error('canvas.toBlob falló'));
      }, 'image/webp', 0.88);
    };
    img.onerror = reject;
    img.src = dataUrl;
  });
}

function cargarScript(src) {
  return new Promise((res, rej) => {
    const s = document.createElement('script');
    s.src = src; s.onload = res; s.onerror = rej;
    document.head.appendChild(s);
  });
}

function descargarBlob(contenido, nombre, tipo) {
  const blob = new Blob([contenido], { type: tipo });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = nombre; a.click();
  URL.revokeObjectURL(url);
}
