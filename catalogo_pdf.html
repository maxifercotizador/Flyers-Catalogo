<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script>
// Modo embed (cuando el catálogo se carga dentro de un iframe en otra app):
// hide-toolbar + viewport ajustado para que el contenido entre en mobile sin zoom.
(function(){
    var p = new URLSearchParams((location.hash || '').replace(/^#/, ''));
    if (p.get('embed') === '1') {
        document.documentElement.setAttribute('data-embed', '1');
        var m = document.querySelector('meta[name="viewport"]');
        if (m) m.setAttribute('content', 'width=1100, initial-scale=1, maximum-scale=2, user-scalable=yes');
    }
})();
</script>
<style id="embed-mode-css">html[data-embed="1"] .toolbar{display:none !important}</style>
<title>MAXIFER · Catálogo Imprimible</title>
<meta name="description" content="Catálogo MAXIFER · Versión imprimible (PDF)">
<meta name="robots" content="noindex,nofollow">
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="32x32" href="img/favicon-32.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800;900&family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@1,700;1,800&display=swap" rel="stylesheet">

<!-- jsPDF + html2canvas para descarga real de PDF -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<!-- SheetJS para leer los Excels de precios -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<!-- Datos del catálogo (separados en archivos JS por límite de tool call API) -->
<script src="catalogo-data.js"></script>
<script src="surtidos-data.js"></script>
<!-- Renderer basado en layout-config.json (editor.html) -->
<script src="renderer-layout.js"></script>

<style>
:root{
    --navy:#1a3a7a; --navy-dark:#13295a; --navy-light:#2151a8;
    --green:#0e8a4a; --green-dark:#0a6b39; --green-light:#3aa86b;
    --red:#c8102e;
    --bg:#eef1f7; --bg-soft:#f5f7fb;
    --border:#dde3ee; --border-strong:#c5cee0;
    --text:#1a2238; --text-muted:#5a6685;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{
    background:var(--bg);color:var(--text);
    font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
    -webkit-font-smoothing:antialiased;
}

/* Loading overlay (mientras carga el Excel) */
.loading-overlay{
    position:fixed;inset:0;z-index:2000;
    background:linear-gradient(135deg,var(--navy-dark),var(--navy));
    color:#fff;display:flex;align-items:center;justify-content:center;
    flex-direction:column;gap:18px;
    transition:opacity .3s;
}
.loading-overlay.gone{opacity:0;pointer-events:none}
.loading-overlay img{
    width:90px;height:90px;background:#fff;border-radius:18px;padding:6px;
    box-shadow:0 8px 24px rgba(0,0,0,.3);
}
.loading-overlay .lo-title{
    font-family:'Montserrat',sans-serif;font-size:24px;font-weight:900;letter-spacing:.12em;
}
.loading-overlay .lo-text{font-size:13px;opacity:.85;letter-spacing:.06em}
.loading-overlay .spinner{
    width:34px;height:34px;border:3px solid rgba(255,255,255,.25);
    border-top-color:#fff;border-radius:50%;
    animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* Toolbar */
.toolbar{
    position:fixed;top:14px;right:14px;z-index:1000;
    display:flex;gap:10px;align-items:center;
    background:#fff;border:1px solid var(--border);border-radius:14px;
    padding:10px 14px;box-shadow:0 8px 24px rgba(19,41,90,.18);
}
.toolbar .meta{font-size:12px;color:var(--text-muted);line-height:1.3}
.toolbar .meta strong{color:var(--navy);display:block;font-size:13px}
.btn-print{
    background:linear-gradient(180deg,var(--green-light),var(--green));
    color:#fff;border:none;padding:11px 18px;border-radius:10px;
    font-weight:800;font-size:13px;letter-spacing:.04em;cursor:pointer;
    text-transform:uppercase;
    box-shadow:0 4px 10px rgba(14,138,74,.35);
    display:inline-flex;align-items:center;gap:8px;
    transition:transform .12s, opacity .15s;
}
.btn-print:hover{transform:translateY(-1px)}
.btn-print:disabled{opacity:.6;cursor:wait;transform:none}

.book{max-width:210mm;margin:0 auto;padding:20px 0 60px}

/* PÁGINA A4 */
.page{
    width:210mm; height:297mm;
    background:#fff;
    margin:0 auto 20px;
    box-shadow:0 4px 18px rgba(19,41,90,.10);
    position:relative;
    overflow:hidden;
    page-break-after:always;
}
.page:last-child{page-break-after:auto}

.frame{
    position:absolute;top:0;left:0;width:100%;height:100%;
    pointer-events:none;z-index:0;
}

.page-body{
    position:relative;z-index:1;
    width:100%;height:100%;
    padding:24mm 18mm 22mm;
    display:flex;flex-direction:column;
}

.page-header{
    display:flex;align-items:center;justify-content:space-between;
    padding:0 0 5mm 44mm;border-bottom:1px solid var(--border);
    margin-bottom:5mm;
}
.brand-block{display:flex;align-items:center;gap:10px}
.brand-block img{
    width:38px;height:38px;object-fit:contain;
    border-radius:8px;background:#fff;padding:2px;
    border:1px solid var(--border);
}
.brand-block .b-name{
    font-family:'Montserrat',sans-serif;font-size:16px;font-weight:900;
    color:var(--navy);letter-spacing:.06em;line-height:1;
}
.brand-block .b-sub{
    font-size:9px;color:var(--text-muted);font-weight:700;
    text-transform:uppercase;letter-spacing:.18em;margin-top:3px;
}
.vendor-block{
    text-align:right;font-size:11px;color:var(--text-muted);line-height:1.5;
}
.vendor-block .v-name{
    color:var(--navy);font-weight:800;font-size:13px;display:block;
    font-family:'Montserrat',sans-serif;
}
.vendor-block .v-wa{
    color:var(--green-dark);font-weight:700;font-size:11px;display:block;
    font-family:ui-monospace,Menlo,monospace;
}

.surtido-title{
    display:flex;align-items:center;gap:12px;margin-bottom:5mm;
}
.surtido-codigo-pill{
    background:linear-gradient(135deg,var(--navy),var(--navy-light));
    color:#fff;font-family:'Montserrat',sans-serif;font-weight:900;
    font-size:13px;padding:8px 14px;border-radius:8px;letter-spacing:.06em;
    box-shadow:0 2px 5px rgba(26,58,122,.25);
    white-space:nowrap;text-transform:uppercase;
}
.surtido-name{
    font-family:'Montserrat',sans-serif;font-size:21px;font-weight:800;
    color:var(--navy);line-height:1.15;flex:1;
    text-transform:uppercase;letter-spacing:.02em;
}

.hero{
    display:grid;grid-template-columns:1fr 1fr;gap:6mm;margin-bottom:5mm;
}
.hero.single{grid-template-columns:1fr}
/* Layout GRANDE: exhibidor full-width arriba (sin recuadro), gaveta más chica abajo */
.hero.grande{
    display:flex;flex-direction:column;gap:3mm;margin-bottom:4mm;
}
.hero.grande .photo.exhibidor-grande{
    height:100mm;width:100%;
    /* Sin recuadro celeste — el exhibidor flota libre */
    background:transparent;border:none;padding:0;
}
.hero.grande .photo.exhibidor-grande .ph-label{
    /* La etiqueta sigue visible aunque sin fondo */
    background:#fff;
}
.hero.grande .photo.gaveta-bajo{
    height:46mm;max-width:55%;align-self:center;
}
.hero .photo{
    background:var(--bg-soft);border:1px solid var(--border);
    border-radius:10px;padding:6px;
    height:80mm;
    display:flex;flex-direction:column;
    align-items:center;justify-content:center;position:relative;
}
.hero .photo img{
    max-width:100%;max-height:calc(100% - 16px);object-fit:contain;
}
.hero .photo .ph-label{
    position:absolute;top:6px;left:8px;
    font-size:9px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;
    color:var(--text-muted);
    background:#fff;padding:3px 7px;border-radius:5px;
    border:1px solid var(--border);
}

.specs{
    display:grid;grid-template-columns:repeat(3,1fr);gap:4mm;margin-bottom:5mm;
}
.spec{
    background:var(--bg-soft);border:1px solid var(--border);
    border-left:3px solid var(--green);
    border-radius:8px;padding:7px 10px;
}
.spec .s-label{
    font-size:9px;color:var(--text-muted);font-weight:700;
    text-transform:uppercase;letter-spacing:.08em;
}
.spec .s-value{
    font-family:'Montserrat',sans-serif;font-size:13px;font-weight:800;
    color:var(--navy);margin-top:2px;line-height:1.2;
}

.incluye{
    background:#fff;border:1px solid var(--border);border-radius:10px;
    padding:9px 14px;margin-bottom:4mm;
    /* Layout 2 columnas: lista izq, precio der separado por borde navy */
    display:flex;gap:14px;align-items:stretch;
}
.incluye-list{flex:1;min-width:0}
.incluye .h{
    font-size:10px;font-weight:800;color:var(--navy);
    text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px;
    display:flex;align-items:center;gap:6px;
}
.incluye .h::before{content:'✓';color:var(--green);font-weight:900}
.incluye ul{list-style:none;margin:0}
.incluye li{
    font-size:11.5px;color:var(--text);padding:2px 0;
    display:flex;gap:8px;align-items:flex-start;
}
.incluye li::before{
    content:'•';color:var(--green-dark);font-weight:900;flex-shrink:0;
}
/* Precio inline dentro del Incluye (lado derecho) */
.precio-inline{
    flex:0 0 140px;
    border-left:1.5px solid var(--navy);
    padding:2px 0 2px 14px;
    display:flex;flex-direction:column;justify-content:center;
}
.precio-inline .p-label{
    font-size:9.5px;font-weight:800;text-transform:uppercase;
    letter-spacing:.12em;color:var(--navy);margin-bottom:2px;
}
.precio-inline .p-value{
    font-family:'Montserrat',sans-serif;font-size:21px;font-weight:900;
    line-height:1.05;color:var(--navy);
}
.precio-inline .p-hint{
    font-size:9.5px;color:var(--text-muted);margin-top:3px;font-weight:600;
}
.precio-inline.sin .p-label, .precio-inline.sin .p-value{color:#444}
.precio-inline.sin .p-value{font-size:13px;line-height:1.2}
.precio-inline.desc .p-old{
    text-decoration:line-through;color:var(--text-muted);font-size:12px;
    font-weight:600;display:block;margin-bottom:2px;
}

.tabla-section{
    flex:1;display:flex;flex-direction:column;
    background:#fff;border:1px solid var(--border);border-radius:10px;
    padding:9px 14px;margin-bottom:4mm;min-height:0;
}
.tabla-section .h{
    font-size:10px;font-weight:800;color:var(--navy);
    text-transform:uppercase;letter-spacing:.1em;margin-bottom:7px;
    display:flex;align-items:center;gap:6px;
}
.tabla-section .h::before{content:'📋'}
.tabla-grid{
    display:grid;grid-template-columns:repeat(4,1fr);gap:4px 8px;
    font-size:10.5px;
}
.tabla-grid.cols5{grid-template-columns:repeat(5,1fr);font-size:9.5px}
.tabla-grid.cols6{grid-template-columns:repeat(6,1fr);font-size:9px}
.tabla-grid .row{
    display:flex;align-items:center;gap:6px;padding:3px 6px;
    background:var(--bg-soft);border-radius:5px;
    border-left:2px solid var(--navy-light);
}
.tabla-grid .cant{
    font-weight:800;color:var(--navy);font-family:'Montserrat',sans-serif;
    min-width:20px;text-align:right;
}
.tabla-grid .med{
    color:var(--text);font-family:ui-monospace,Menlo,monospace;font-size:10px;
}
.tabla-grid.cols5 .med, .tabla-grid.cols6 .med{font-size:9px}

.uniforme{
    background:linear-gradient(135deg,rgba(14,138,74,.08),rgba(26,58,122,.05));
    border:1px solid var(--border);border-left:3px solid var(--green);
    border-radius:10px;padding:12px 18px;margin-bottom:4mm;
    display:flex;align-items:center;gap:14px;
}
.uniforme .u-icon{font-size:30px;line-height:1}
.uniforme .u-text{flex:1}
.uniforme .u-title{
    font-size:10px;font-weight:800;color:var(--text-muted);
    text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px;
}
.uniforme .u-value{
    font-family:'Montserrat',sans-serif;font-size:17px;font-weight:800;
    color:var(--navy);
}

.page-footer{
    margin-top:auto;
    padding-top:4mm;border-top:1px solid var(--border);
}
.cta-block{
    text-align:right;font-size:10px;color:var(--text-muted);line-height:1.5;
}
.cta-block strong{
    color:var(--navy);font-size:11px;
    font-family:'Montserrat',sans-serif;font-weight:800;letter-spacing:.04em;
}
.cta-block .cta-wa{color:var(--green-dark);font-weight:700}

/* ── PORTADA ── */
.cover-body{
    position:relative;z-index:1;
    width:100%;height:100%;
    padding:50mm 30mm 36mm;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;
}
.cover-logo{
    width:90px;height:90px;object-fit:contain;
    background:#fff;border-radius:18px;padding:6px;
    border:1px solid var(--border);margin-bottom:12mm;
    box-shadow:0 6px 18px rgba(26,58,122,.18);
}
.cover-brand{
    font-family:'Montserrat',sans-serif;font-size:46px;font-weight:900;
    color:var(--navy);letter-spacing:.14em;line-height:1;margin-bottom:5mm;
}
.cover-tagline{
    font-size:12px;color:var(--text-muted);font-weight:700;
    text-transform:uppercase;letter-spacing:.3em;margin-bottom:15mm;
}
.cover-title{
    font-family:'Montserrat',sans-serif;font-size:28px;font-weight:800;
    color:var(--navy);line-height:1.2;margin-bottom:5mm;
}
.cover-sub{
    font-size:14px;color:var(--text);max-width:140mm;
    line-height:1.5;margin-bottom:12mm;
}
.cover-stats{
    display:flex;gap:22mm;margin-bottom:12mm;
}
.cover-stat{text-align:center}
.cover-stat .num{
    font-family:'Montserrat',sans-serif;font-size:34px;font-weight:900;
    color:var(--green-dark);line-height:1;
}
.cover-stat .lbl{
    font-size:10px;color:var(--text-muted);font-weight:700;
    text-transform:uppercase;letter-spacing:.1em;margin-top:4px;
}
.cover-vendor{
    background:var(--bg-soft);border:1px solid var(--border);
    border-radius:14px;padding:14px 22px;
    display:inline-block;
}
.cover-vendor .cv-label{
    font-size:10px;color:var(--text-muted);font-weight:700;
    text-transform:uppercase;letter-spacing:.12em;
}
.cover-vendor .cv-name{
    font-family:'Montserrat',sans-serif;font-size:18px;font-weight:800;
    color:var(--navy);margin:4px 0 2px;
}
.cover-vendor .cv-wa{
    font-family:ui-monospace,Menlo,monospace;font-size:13px;
    color:var(--green-dark);font-weight:700;
}

/* ── CONTRATAPA ── */
.bcover-body{
    position:relative;z-index:1;
    width:100%;height:100%;
    padding:50mm 30mm 36mm;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    text-align:center;
}
.bcover-thanks{
    font-family:'Playfair Display','Georgia',serif;font-style:italic;font-weight:800;
    font-size:54px;color:var(--navy);line-height:1;margin-bottom:6mm;
}
.bcover-msg{
    font-size:15px;color:var(--text);line-height:1.6;
    max-width:140mm;margin-bottom:16mm;
}
.bcover-msg b{color:var(--navy)}
.bcover-cta{
    background:linear-gradient(135deg,var(--green-light),var(--green));
    color:#fff;border-radius:14px;padding:18px 28px;
    box-shadow:0 6px 18px rgba(14,138,74,.35);
    display:inline-block;margin-bottom:14mm;
}
.bcover-cta .ct-label{
    font-size:11px;font-weight:800;text-transform:uppercase;
    letter-spacing:.16em;opacity:.95;margin-bottom:5px;
}
.bcover-cta .ct-name{
    font-family:'Montserrat',sans-serif;font-size:22px;font-weight:900;line-height:1.1;
}
.bcover-cta .ct-wa{
    font-family:ui-monospace,Menlo,monospace;font-size:14px;
    font-weight:700;margin-top:4px;
}
.bcover-foot{
    font-size:11px;color:var(--text-muted);font-weight:700;
    text-transform:uppercase;letter-spacing:.18em;
}
.bcover-foot a{color:var(--navy);text-decoration:none}

/* ── ÍNDICE ── */
.idx-body{
    position:relative;z-index:1;
    width:100%;height:100%;
    padding:24mm 22mm 22mm;
    display:flex;flex-direction:column;
}
.idx-title{
    font-family:'Montserrat',sans-serif;font-size:30px;font-weight:900;
    color:var(--navy);letter-spacing:.12em;text-transform:uppercase;
    margin-bottom:1mm;margin-left:44mm;
}
.idx-sub{
    font-size:11px;color:var(--text-muted);font-weight:700;
    letter-spacing:.16em;text-transform:uppercase;margin-bottom:6mm;
    margin-left:44mm;
}
.idx-cols{
    flex:1;
    column-count:2;column-gap:8mm;
}
.idx-grupo{
    margin-bottom:3mm;
    break-inside:avoid;
    -webkit-column-break-inside:avoid;
    page-break-inside:avoid;
}
.idx-grupo-h{
    font-family:'Montserrat',sans-serif;font-size:10px;font-weight:900;
    color:var(--green-dark);text-transform:uppercase;letter-spacing:.1em;
    padding:3px 0 3px;border-bottom:1.5px solid var(--green);
    margin-bottom:2mm;display:flex;align-items:center;gap:6px;
}
.idx-row{
    display:flex;align-items:baseline;gap:5px;
    padding:2px 0;
    font-size:10px;
}
.idx-cod{
    font-family:ui-monospace,Menlo,monospace;font-size:8.5px;
    color:var(--text-muted);font-weight:700;
    background:var(--bg-soft);padding:1px 5px;border-radius:4px;
    border:1px solid var(--border);min-width:62px;text-align:center;
}
.idx-name{
    flex:1;color:var(--text);font-weight:600;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.idx-page{
    font-family:'Montserrat',sans-serif;font-weight:800;color:var(--navy);
    font-size:10px;min-width:18px;text-align:right;
}

/* ── ESTILOS DEL RENDERER LAYOUT (driven by layout-config.json) ── */
.rl-layout{position:absolute;inset:0;z-index:1}
.rl-block{box-sizing:border-box;overflow:hidden}
.rl-brand-img{display:flex;align-items:center;justify-content:center;width:100%;height:100%}
.rl-brand-img img{max-width:100%;max-height:100%;object-fit:contain;background:#fff;border-radius:8px;padding:2px;border:1px solid var(--border)}
.rl-pill{
    display:inline-flex;align-items:center;justify-content:center;
    background:linear-gradient(135deg,var(--navy),var(--navy-light));
    color:#fff;font-family:'Montserrat',sans-serif;font-weight:900;
    border-radius:8px;letter-spacing:.06em;
    box-shadow:0 2px 5px rgba(26,58,122,.25);
    text-transform:uppercase;padding:0 10px;
    width:100%;height:100%;
}
.rl-photo{
    background:var(--bg-soft);border:1px solid var(--border);
    border-radius:10px;padding:6px;
    display:flex;align-items:center;justify-content:center;position:relative;
    width:100%;height:100%;
}
.rl-photo.rl-no-bg{background:transparent;border:none;padding:0}
.rl-photo img{max-width:100%;max-height:100%;object-fit:contain}
.rl-ph-label{
    position:absolute;top:6px;left:8px;
    font-size:9px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;
    color:var(--text-muted);background:#fff;padding:3px 7px;border-radius:5px;
    border:1px solid var(--border);
}
.rl-spec{
    background:var(--bg-soft);border:1px solid var(--border);
    border-left:3px solid var(--green);border-radius:8px;
    padding:7px 10px;display:flex;flex-direction:column;justify-content:center;
    width:100%;height:100%;
}
.rl-spec .rl-lbl{font-size:9px;color:var(--text-muted);font-weight:700;text-transform:uppercase;letter-spacing:.08em}
.rl-spec .rl-val{font-family:'Montserrat',sans-serif;font-size:13px;font-weight:800;color:var(--navy);margin-top:2px;line-height:1.2}
.rl-incluye{
    background:#fff;border:1px solid var(--border);border-radius:10px;
    padding:9px 14px;width:100%;height:100%;
}
.rl-incluye .rl-h{font-size:10px;font-weight:800;color:var(--navy);text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px;display:flex;align-items:center;gap:6px}
.rl-incluye .rl-h::before{content:'✓';color:var(--green);font-weight:900}
.rl-incluye ul{list-style:none;margin:0;padding:0}
.rl-incluye li{font-size:11.5px;color:var(--text);padding:2px 0;display:flex;gap:8px}
.rl-incluye li::before{content:'•';color:var(--green-dark);font-weight:900}
.rl-precio{
    background:#fff;border:2px solid var(--navy);
    border-radius:12px;padding:8px 14px;
    width:100%;height:100%;
    display:flex;flex-direction:column;justify-content:center;
}
.rl-precio.rl-sin{border-color:#888;background:#fafafa}
.rl-precio.rl-sin .rl-lbl, .rl-precio.rl-sin .rl-val{color:#444}
.rl-precio .rl-lbl{font-size:9.5px;font-weight:800;text-transform:uppercase;letter-spacing:.12em;color:var(--navy);margin-bottom:2px}
.rl-precio .rl-val{font-family:'Montserrat',sans-serif;font-size:21px;font-weight:900;line-height:1.05;color:var(--navy)}
.rl-precio .rl-old{text-decoration:line-through;color:var(--text-muted);font-size:12px;font-weight:600;display:block;margin-bottom:2px}
.rl-precio .rl-hint{font-size:9.5px;color:var(--text-muted);margin-top:3px;font-weight:600}
.rl-tabla{
    background:#fff;border:1px solid var(--border);border-radius:10px;
    padding:9px 14px;width:100%;height:100%;
}
.rl-tabla .rl-h{font-size:10px;font-weight:800;color:var(--navy);text-transform:uppercase;letter-spacing:.1em;margin-bottom:7px;display:flex;align-items:center;gap:6px}
.rl-tabla .rl-h::before{content:'📋'}
.rl-tabla .rl-grid{display:grid;gap:4px 8px}
.rl-tabla .rl-row{display:flex;align-items:center;gap:6px;padding:3px 6px;background:var(--bg-soft);border-radius:5px;border-left:2px solid var(--navy-light)}
.rl-tabla .rl-cant{font-weight:800;color:var(--navy);font-family:'Montserrat',sans-serif;min-width:20px;text-align:right}
.rl-tabla .rl-med{color:var(--text);font-family:ui-monospace,monospace;font-size:10px}
.rl-uniforme{
    background:linear-gradient(135deg,rgba(14,138,74,.08),rgba(26,58,122,.05));
    border:1px solid var(--border);border-left:3px solid var(--green);
    border-radius:10px;padding:12px 18px;display:flex;align-items:center;gap:14px;
    width:100%;height:100%;
}
.rl-uniforme .rl-ico{font-size:30px;line-height:1}
.rl-uniforme .rl-utext{flex:1}
.rl-uniforme .rl-lbl{font-size:10px;font-weight:800;color:var(--text-muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px}
.rl-uniforme .rl-val{font-family:'Montserrat',sans-serif;font-size:17px;font-weight:800;color:var(--navy)}
.rl-footer{
    border-top:1px solid var(--border);padding-top:4mm;
    text-align:right;font-size:10px;color:var(--text-muted);line-height:1.5;
    width:100%;height:100%;
}
.rl-footer strong{color:var(--navy);font-family:'Montserrat',sans-serif;font-weight:800;letter-spacing:.04em}
.rl-footer .rl-wa{color:var(--green-dark);font-weight:700}
.rl-cover-logo{display:flex;align-items:center;justify-content:center;width:100%;height:100%}
.rl-cover-logo img{
    max-width:100%;max-height:100%;object-fit:contain;
    background:#fff;border-radius:18px;padding:6px;border:1px solid var(--border);
    box-shadow:0 6px 18px rgba(26,58,122,.18);
}
.rl-cover-stats{display:flex;justify-content:space-around;align-items:center;width:100%;height:100%;gap:8mm}
.rl-cs-item{text-align:center}
.rl-cs-num{font-family:'Montserrat',sans-serif;font-size:34px;font-weight:900;color:var(--green-dark);line-height:1}
.rl-cs-lbl{font-size:10px;color:var(--text-muted);font-weight:700;text-transform:uppercase;letter-spacing:.1em;margin-top:4px}
.rl-cover-vendor{
    background:var(--bg-soft);border:1px solid var(--border);
    border-radius:14px;padding:14px 22px;
    text-align:center;width:100%;height:100%;
    display:flex;flex-direction:column;justify-content:center;
}
.rl-cv-lbl{font-size:10px;color:var(--text-muted);font-weight:700;text-transform:uppercase;letter-spacing:.12em}

.rl-idx-grupo-h{font-family:'Montserrat',sans-serif;font-size:10px;font-weight:900;color:var(--green-dark);text-transform:uppercase;letter-spacing:.1em;padding:3px 0;border-bottom:1.5px solid var(--green);margin-bottom:2mm;display:flex;align-items:center;gap:6px}
.rl-idx-row{display:flex;align-items:baseline;gap:5px;padding:2px 0;font-size:10px}
.rl-idx-cod{font-family:ui-monospace,Menlo,monospace;font-size:8.5px;color:var(--text-muted);font-weight:700;background:var(--bg-soft);padding:1px 5px;border-radius:4px;border:1px solid var(--border);min-width:62px;text-align:center}
.rl-idx-name{flex:1;color:var(--text);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.rl-bcover-cta{
    background:linear-gradient(135deg,var(--green-light),var(--green));

}

<body>

<!-- Loading overlay (oculto al terminar de cargar el Excel) -->
<div class="loading-overlay" id="loadingOverlay">
    <img src="img/favicon-192.png" alt="MAXIFER">
    <div class="lo-title">MAXIFER</div>
    <div class="spinner"></div>
    <div class="lo-text" id="loadingText">Descargando lista de precios…</div>
</div>

<!-- Toolbar -->
<div class="toolbar">
    <div class="meta">
        <strong id="metaVendor">Maxi</strong>
        <span id="metaMode">Precio Lista</span>
    </div>
    <button class="btn-print" id="btnDescargar" disabled>📥 Descargar PDF</button>
</div>

<div class="book" id="book"></div>

<script>
// Las constantes GRUPOS, MODELOS_DIFERENTES, CANTIDADES_GAVETAS, VERSION_REDUCIDA,
// MAXIFER_EXCEL_URLS, las funciones maxifer*, y SURTIDOS vienen de
// catalogo-data.js y surtidos-data.js (cargados antes de este script).

const VENDEDORES = {
    'Maxi':     { nombre:'Maximiliano Gordillo', wa:'5491150408378' },
    'Micky':    { nombre:'Micky',                wa:'5491164865752' },
    'Victor':   { nombre:'Victor Gordillo',      wa:'5491149367336' },
    'Nadia':    { nombre:'Nadia',                wa:'5491128243870' },
    'Eduardo':  { nombre:'Eduardo',              wa:'5492634688163' },
    'Federico': { nombre:'Federico',             wa:'5493516017663' }
};

const ANIO = '26'; // 2026
let COMPOSICION_DATA = {};

function leerParams(){
    const h = (location.hash || '').replace(/^#/, '');
    const p = new URLSearchParams(h);
    return {
        vendor: p.get('wa') || 'Maxi',
        precio: p.get('precio'),
        desc:   p.get('desc'),
        autodl: p.get('autodl') === '1'
    };
}

function formatNum(n){
    if (!n && n !== 0) return '—';
    return n.toLocaleString('es-AR');
}

function formatWA(num){
    if (!num) return '';
    const m = String(num).match(/^54(9?)(\d{2,3})(\d{4})(\d{4})$/);
    if (!m) return '+' + num;
    return '+54 ' + (m[1] ? '9 ' : '') + m[2] + ' ' + m[3] + '-' + m[4];
}

function getGrupo(s){
    for (const g of GRUPOS){
        if (g.codigos.includes(s.codigo)) return g;
    }
    return { key:'otros', label:'Otros', icono:'📦', color:'#9ca3af', codigos:[] };
}

function frameSVG(pageNum, opts){
    opts = opts || {};
    const showPage = opts.showPage !== false;
    const numEl = showPage ? `
        <circle cx="14" cy="285" r="5.5" fill="#ffffff"/>
        <text x="14" y="287.5" text-anchor="middle"
              font-family="'Inter', sans-serif" font-weight="800" font-size="6.5" fill="#1a3a7a">${pageNum}</text>` : '';
    return `
    <svg class="frame" viewBox="0 0 210 297" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M 0,0 L 78,0 Q 64,18 50,32 Q 30,50 0,72 Z" fill="#1a3a7a"/>
        <path d="M 0,68 Q 30,46 52,30 Q 70,17 88,8 Q 130,2 168,16 Q 192,24 210,12 L 210,2 Q 192,16 168,8 Q 130,-2 88,2 Q 68,10 50,24 Q 28,40 0,60 Z" fill="#0e8a4a"/>
        <path d="M 196,0 L 210,0 L 210,22 Q 204,11 196,0 Z" fill="#c8102e"/>
        <text x="14" y="30" font-family="'Playfair Display', Georgia, serif"
              font-style="italic" font-weight="800" font-size="26" fill="#ffffff">${ANIO}</text>
        <path d="M 0,253 Q 18,258 32,272 Q 44,284 56,297 L 0,297 Z" fill="#1a3a7a"/>
        <path d="M 0,275 Q 28,283 52,283 Q 88,283 130,288 Q 170,292 196,283 Q 204,279 210,288 L 210,297 L 0,297 Z" fill="#0e8a4a"/>
        <path d="M 199,297 L 210,297 L 210,278 Q 205,288 199,297 Z" fill="#c8102e"/>
        ${numEl}
    </svg>`;
}

function renderPortada(ctx, totalSurtidos){
    const v = VENDEDORES[ctx.vendor] || VENDEDORES.Maxi;
    let modeText = 'Edición precio lista';
    if (ctx.precio === 'sin') modeText = 'Edición sin precios';
    else if (ctx.desc) modeText = `Edición con −${ctx.desc}% aplicado`;

    const piezasTotales = SURTIDOS.reduce((acc, s) => acc + (s.piezas || 0), 0);

    return `
    <section class="page">
        ${frameSVG(1, {showPage:false})}
        <div class="cover-body">
            <img class="cover-logo" src="img/favicon-192.png" alt="MAXIFER">
            <div class="cover-brand">MAXIFER</div>
            <div class="cover-tagline">Fábrica · Importadora</div>
            <div class="cover-title">Catálogo de Surtidos 20${ANIO}</div>
            <div class="cover-sub">Exhibidores con gavetas codificadas para tu ferretería · ${modeText}</div>
            <div class="cover-stats">
                <div class="cover-stat">
                    <div class="num">${totalSurtidos}</div>
                    <div class="lbl">Surtidos</div>
                </div>
                <div class="cover-stat">
                    <div class="num">${formatNum(piezasTotales)}</div>
                    <div class="lbl">Piezas en exhibición</div>
                </div>
                <div class="cover-stat">
                    <div class="num">100%</div>
                    <div class="lbl">Libre reposición</div>
                </div>
            </div>
            <div class="cover-vendor">
                <div class="cv-label">Tu vendedor</div>
                <div class="cv-name">${v.nombre}</div>
                <div class="cv-wa">${formatWA(v.wa)}</div>
            </div>
        </div>
    </section>`;
}

function renderIndice(surtidos, paginaInicio){
    const grupoMap = new Map();
    for (let i = 0; i < surtidos.length; i++){
        const s = surtidos[i];
        const g = getGrupo(s);
        if (!grupoMap.has(g.key)) grupoMap.set(g.key, { grupo:g, items:[] });
        grupoMap.get(g.key).items.push({ s, pagina: paginaInicio + i });
    }

    const bloques = [];
    for (const g of GRUPOS){
        const data = grupoMap.get(g.key);
        if (!data || !data.items.length) continue;
        const filas = data.items.map(it => `
            <div class="idx-row">
                <span class="idx-cod">${it.s.codigo}</span>
                <span class="idx-name">${it.s.nombre}</span>
                <span class="idx-page">${it.pagina}</span>
            </div>`).join('');
        bloques.push(`
            <div class="idx-grupo">
                <div class="idx-grupo-h">${g.icono} ${g.label}</div>
                ${filas}
            </div>`);
    }

    return `
    <section class="page">
        ${frameSVG(2)}
        <div class="idx-body">
            <h1 class="idx-title">Índice</h1>
            <div class="idx-sub">${surtidos.length} surtidos · Catálogo MAXIFER 20${ANIO}</div>
            <div class="idx-cols">${bloques.join('')}</div>
        </div>
    </section>`;
}

function renderPagina(s, ctx, pageNum){
    const v = VENDEDORES[ctx.vendor] || VENDEDORES.Maxi;
    const sinPrecio = ctx.precio === 'sin';
    const descNum = ctx.desc ? parseInt(ctx.desc, 10) : 0;
    const precioLista = s.precio || 0;
    const precioFinal = descNum > 0 ? Math.round(precioLista * (1 - descNum/100)) : precioLista;

    let precioHTML;
    if (sinPrecio){
        precioHTML = `
            <div class="precio-inline sin">
                <div class="p-label">Consultar precio</div>
                <div class="p-value">Contactar al vendedor</div>
                <div class="p-hint">Coordiná por WhatsApp</div>
            </div>`;
    } else if (descNum > 0){
        precioHTML = `
            <div class="precio-inline desc">
                <div class="p-label">Precio con −${descNum}%</div>
                <span class="p-old">$${formatNum(precioLista)}</span>
                <div class="p-value">$${formatNum(precioFinal)}</div>
                <div class="p-hint">+ IVA</div>
            </div>`;
    } else {
        precioHTML = `
            <div class="precio-inline">
                <div class="p-label">Precio Lista</div>
                <div class="p-value">$${formatNum(precioLista)}</div>
                <div class="p-hint">+ IVA</div>
            </div>`;
    }

    let stockHTML = '';
    if (s.tabla && s.tabla.length){
        let colsClass = '';
        if (s.tabla.length > 32) colsClass = ' cols6';
        else if (s.tabla.length > 24) colsClass = ' cols5';
        const filas = s.tabla.map(r => `
            <div class="row">
                <span class="cant">${r.cant}</span>
                <span class="med">${r.medida}</span>
            </div>`).join('');
        stockHTML = `
            <div class="tabla-section">
                <div class="h">Composición · ${s.tabla.length} medidas</div>
                <div class="tabla-grid${colsClass}">${filas}</div>
            </div>`;
    } else if (s.cant_uniforme){
        stockHTML = `
            <div class="uniforme">
                <div class="u-icon">📦</div>
                <div class="u-text">
                    <div class="u-title">Cantidades por modelo</div>
                    <div class="u-value">${s.cant_uniforme}</div>
                </div>
            </div>`;
    }

    const hasGaveta = s.foto_gavetas && s.foto_gavetas.length;
    const hasExhibidor = s.foto_exhibidor && s.foto_exhibidor.length;
    const fotoGavetaSrc = hasGaveta ? s.foto_gavetas : (s.foto_card || '');
    const esGrande = s.tamano === 'grande';
    let heroHTML;
    if (esGrande && hasExhibidor){
        const gavetaBajoHTML = fotoGavetaSrc ? `
                <div class="photo gaveta-bajo">
                    <span class="ph-label">${hasGaveta ? 'Gaveta' : 'Vista'}</span>
                    <img src="${fotoGavetaSrc}" alt="Gaveta ${s.nombre}">
                </div>` : '';
        heroHTML = `
            <div class="hero grande">
                <div class="photo exhibidor-grande">
                    <span class="ph-label">Exhibidor</span>
                    <img src="${s.foto_exhibidor}" alt="Exhibidor ${s.nombre}">
                </div>
                ${gavetaBajoHTML}
            </div>`;
    } else if (hasExhibidor && fotoGavetaSrc){
        heroHTML = `
            <div class="hero">
                <div class="photo">
                    <span class="ph-label">Exhibidor</span>
                    <img src="${s.foto_exhibidor}" alt="Exhibidor ${s.nombre}">
                </div>
                <div class="photo">
                    <span class="ph-label">${hasGaveta ? 'Gaveta' : 'Vista'}</span>
                    <img src="${fotoGavetaSrc}" alt="Gaveta ${s.nombre}">
                </div>
            </div>`;
    } else if (hasExhibidor){
        heroHTML = `
            <div class="hero single">
                <div class="photo">
                    <span class="ph-label">Exhibidor</span>
                    <img src="${s.foto_exhibidor}" alt="${s.nombre}">
                </div>
            </div>`;
    } else if (s.foto_card){
        heroHTML = `
            <div class="hero single">
                <div class="photo">
                    <span class="ph-label">Vista</span>
                    <img src="${s.foto_card}" alt="${s.nombre}">
                </div>
            </div>`;
    } else {
        heroHTML = '<div class="hero single"><div class="photo"></div></div>';
    }

    const modelos = MODELOS_DIFERENTES[s.codigo] || '—';
    const stockGav = CANTIDADES_GAVETAS[s.codigo] || '—';

    return `
    <section class="page">
        ${frameSVG(pageNum)}
        <div class="page-body">
            <header class="page-header">
                <div class="brand-block">
                    <img src="img/favicon-192.png" alt="MAXIFER">
                    <div>
                        <div class="b-name">MAXIFER</div>
                        <div class="b-sub">Fábrica Importadora</div>
                    </div>
                </div>
                <div class="vendor-block">
                    <span class="v-name">${v.nombre}</span>
                    <span class="v-wa">${formatWA(v.wa)}</span>
                </div>
            </header>

            <div class="surtido-title">
                <span class="surtido-codigo-pill">${s.codigo}</span>
                <h1 class="surtido-name">${s.nombre}</h1>
            </div>

            ${heroHTML}

            <div class="specs">
                <div class="spec">
                    <div class="s-label">Piezas totales</div>
                    <div class="s-value">${formatNum(s.piezas)}</div>
                </div>
                <div class="spec">
                    <div class="s-label">Modelos diferentes</div>
                    <div class="s-value">${modelos}</div>
                </div>
                <div class="spec">
                    <div class="s-label">Stock en gaveta</div>
                    <div class="s-value">${stockGav}</div>
                </div>
            </div>

            <div class="incluye">
                <div class="incluye-list">
                    <div class="h">Incluye</div>
                    <ul>${s.incluye.map(i => `<li>${i}</li>`).join('')}</ul>
                </div>
                ${precioHTML}
            </div>

            ${stockHTML}

            <footer class="page-footer">
                <div class="cta-block">
                    <strong>${v.nombre}</strong> · <span class="cta-wa">WhatsApp ${formatWA(v.wa)}</span> · www.fabricamaxifer.com
                </div>
            </footer>
        </div>
    </section>`;
}

function renderContratapa(ctx, pageNum){
    const v = VENDEDORES[ctx.vendor] || VENDEDORES.Maxi;
    return `
    <section class="page">
        ${frameSVG(pageNum)}
        <div class="bcover-body">
            <img class="cover-logo" src="img/favicon-192.png" alt="MAXIFER">
            <div class="bcover-thanks">¡Gracias!</div>
            <div class="bcover-msg">
                Confiá en <b>MAXIFER</b> para abastecer tu ferretería con surtidos completos,
                exhibidores listos para vender y reposición libre.<br>
                <b>Hacé tu pedido</b> directo con tu vendedor:
            </div>
            <div class="bcover-cta">
                <div class="ct-label">Tu vendedor MAXIFER</div>
                <div class="ct-name">${v.nombre}</div>
                <div class="ct-wa">${formatWA(v.wa)}</div>
            </div>
            <div class="bcover-foot">
                www.fabricamaxifer.com · MAXIFER · Fábrica Importadora · 20${ANIO}
            </div>
        </div>
    </section>`;
}

// Devuelve un array con el HTML de cada página por separado.
// Se usa tanto para el render en pantalla (join) como para la generación
// del PDF página por página.
function buildPagesHTML(){
    const ctx = leerParams();
    const v = VENDEDORES[ctx.vendor] || VENDEDORES.Maxi;
    const surtidos = SURTIDOS;
    const inicioSurtidos = 3;
    const totalSurt = surtidos.length;
    const pageContratapa = inicioSurtidos + totalSurt;

    // Si tenemos LAYOUT_CONFIG (de layout-config.json) usamos el renderer
    // basado en posiciones absolutas. Si no, fallback al renderer viejo.
    if (LAYOUT_CONFIG){
        const idxCtx = { ...ctx, surtidos, paginaInicio: inicioSurtidos };
        return [
            renderPageFromLayout('portada', null, ctx, 1, v),
            renderPageFromLayout('indice', null, idxCtx, 2, v),
            ...surtidos.map((s, i) => {
                const conTabla = s.tabla && s.tabla.length;
                const pageType = s.tamano === 'grande'
                    ? (conTabla ? 'surtido-grande' : 'surtido-grande-uniforme')
                    : (conTabla ? 'surtido-normal' : 'surtido-chico-uniforme');
                return renderPageFromLayout(pageType, s, ctx, inicioSurtidos + i, v);
            }),
            renderPageFromLayout('contratapa', null, ctx, pageContratapa, v)
        ];
    }
    // Fallback (renderer viejo flex/flow)
    return [
        renderPortada(ctx, totalSurt),
        renderIndice(surtidos, inicioSurtidos),
        ...surtidos.map((s, i) => renderPagina(s, ctx, inicioSurtidos + i)),
        renderContratapa(ctx, pageContratapa)
    ];
}

function render(){
    const ctx = leerParams();
    const v = VENDEDORES[ctx.vendor] || VENDEDORES.Maxi;
    document.getElementById('metaVendor').textContent = v.nombre;
    let modeText = 'Precio Lista';
    if (ctx.precio === 'sin') modeText = 'Sin precios';
    else if (ctx.desc) modeText = `Con −${ctx.desc}%`;
    document.getElementById('metaMode').textContent = modeText;

    document.getElementById('book').innerHTML = buildPagesHTML().join('');
}

async function descargarPDF(){
    const btn = document.getElementById('btnDescargar');
    const original = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = '⏳ Generando PDF…';

    // html2canvas clona TODO el documento en cada llamada. Si dejamos las ~77
    // páginas del catálogo en el DOM, cada una de las 77 capturas clona las 77
    // páginas enteras (con todas sus imágenes) → coste O(n²) y descarga lentísima.
    // Solución: vaciar #book y capturar de a una página por vez en un contenedor
    // aislado, de modo que el DOM sólo contenga 1 página durante cada captura.
    const book = document.getElementById('book');
    const bookBackup = book.innerHTML;
    const stage = document.createElement('div');
    stage.style.cssText = 'position:fixed;left:-9999px;top:0;width:210mm;background:#fff';

    try {
        if (document.fonts && document.fonts.ready) await document.fonts.ready;

        const ctx = leerParams();
        const fname = `MAXIFER_Catalogo_${ctx.vendor || 'Maxi'}_${(ctx.precio||'lista')}${ctx.desc?('-'+ctx.desc):''}.pdf`;

        const JsPDF = window.jspdf && window.jspdf.jsPDF;
        if (!JsPDF) throw new Error('jsPDF no se cargó (revisar CDN)');
        if (typeof window.html2canvas !== 'function') throw new Error('html2canvas no se cargó');
        const pdf = new JsPDF({ unit: 'mm', format: 'a4', orientation: 'portrait', compress: true });

        const pagesHTML = buildPagesHTML();

        // Mientras generamos, el DOM visible queda vacío y montamos el stage aislado.
        book.innerHTML = '';
        document.body.appendChild(stage);

        // Scale adaptativo: en mobile bajamos a 1.4 (mucho más rápido, calidad
        // suficiente para A4) y damos yield entre páginas para que el UI thread
        // no quede congelado durante la generación.
        const isSmallScreen = window.innerWidth < 900;
        const renderScale = isSmallScreen ? 1.4 : 1.8;
        for (let i = 0; i < pagesHTML.length; i++){
            btn.innerHTML = `⏳ Página ${i+1}/${pagesHTML.length}…`;
            stage.innerHTML = pagesHTML[i];
            const pageEl = stage.querySelector('.page');

            // Esperar SÓLO las imágenes de esta página.
            const imgs = Array.from(stage.querySelectorAll('img'));
            await Promise.all(imgs.map(img => img.complete ? Promise.resolve() :
                new Promise(r => { img.onload = img.onerror = r; })));

            const canvas = await html2canvas(pageEl, {
                scale: renderScale,
                useCORS: true,
                allowTaint: false,
                letterRendering: true,
                backgroundColor: '#ffffff',
                logging: false,
                width: pageEl.offsetWidth,
                height: pageEl.offsetHeight,
                windowWidth: pageEl.offsetWidth,
                windowHeight: pageEl.offsetHeight,
            });
            const imgData = canvas.toDataURL('image/jpeg', 0.85);
            if (i > 0) pdf.addPage();
            pdf.addImage(imgData, 'JPEG', 0, 0, 210, 297, undefined, 'FAST');
            stage.innerHTML = '';
            await new Promise(r => requestAnimationFrame(() => setTimeout(r, 0)));
        }

        pdf.save(fname);
    } catch(err){
        console.error(err);
        alert('Hubo un error al generar el PDF: ' + (err && err.message || err));
    } finally {
        stage.remove();
        book.innerHTML = bookBackup;
        btn.disabled = false;
        btn.innerHTML = original;
    }
}

async function init(){
    const overlay = document.getElementById('loadingOverlay');
    const loadingText = document.getElementById('loadingText');
    const btn = document.getElementById('btnDescargar');

    // Cargamos el layout-config.json en paralelo a los Excels
    loadingText.textContent = 'Cargando layout y precios…';
    const layoutPromise = (typeof cargarLayoutConfig === 'function') ? cargarLayoutConfig() : Promise.resolve(null);

    try {
        // Descargamos ambos Excel en paralelo (antes era secuencial).
        const [wbListas, wbSurtidos] = await Promise.all([
            maxiferLeerExcel(MAXIFER_EXCEL_URLS.listas),
            maxiferLeerExcel(MAXIFER_EXCEL_URLS.surtidos)
        ]);
        loadingText.textContent = 'Procesando precios…';
        const mapaListas = maxiferMapListas(wbListas);
        COMPOSICION_DATA = maxiferConstruirComposicion(wbSurtidos, mapaListas);
        maxiferCrearAliases(SURTIDOS, COMPOSICION_DATA);
        maxiferRecalcularPrecios(SURTIDOS, COMPOSICION_DATA);
    } catch(err){
        console.error('Error cargando precios:', err);
        loadingText.textContent = 'No se pudieron cargar los precios — continuamos con $0';
        await new Promise(r => setTimeout(r, 800));
    }

    // Esperamos el layout antes de renderizar
    await layoutPromise;

    const ctx = leerParams();
    if (ctx.autodl){
        // En modo autodescarga NO renderizamos las 77 páginas en pantalla:
        // descargarPDF() ya genera cada página por separado. Renderizar el
        // catálogo completo acá sólo duplicaría la descarga de imágenes.
        overlay.classList.add('gone');
        await descargarPDF();
        render();
    } else {
        render();
        await new Promise(r => setTimeout(r, 300));
        overlay.classList.add('gone');
        btn.disabled = false;
    }
}

document.getElementById('btnDescargar').addEventListener('click', descargarPDF);
window.addEventListener('hashchange', render);
init();
</script>
