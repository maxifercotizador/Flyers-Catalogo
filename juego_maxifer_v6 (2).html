<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>MAXIFER RUNNER</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Press+Start+2P&display=swap');
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a1a0a;overflow:hidden;width:100vw;height:100vh;font-family:'Bebas Neue',sans-serif;}
.scr{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .3s;}
.scr.off{opacity:0;pointer-events:none;}
/* INICIO */
#s0{background:radial-gradient(ellipse at 50% 40%,#0d2a0d,#050f05);}
.logo{font-family:'Bebas Neue',sans-serif;font-size:clamp(4rem,11vw,9rem);color:#fff;letter-spacing:8px;line-height:1;text-align:center;}
.logo em{color:#e63946;font-style:normal;}
.logo::after{content:'';display:block;height:5px;background:linear-gradient(90deg,transparent,#e63946,#ffd60a,#e63946,transparent);margin-top:8px;border-radius:3px;}
.gtitle{font-family:'Press Start 2P',monospace;font-size:clamp(.7rem,1.8vw,1.1rem);color:#ffd60a;letter-spacing:2px;margin:16px 0 6px;text-align:center;}
.ibox{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:20px 32px;max-width:500px;margin:18px 0 28px;text-align:center;}
.ibox p{color:rgba(255,255,255,.8);font-size:clamp(.95rem,2.5vw,1.2rem);line-height:1.95;}
.ibox b{color:#ffd60a;}
.btn{background:#e63946;color:#fff;border:none;font-family:'Bebas Neue',sans-serif;font-size:clamp(1.6rem,4vw,2.4rem);letter-spacing:6px;padding:15px 65px;border-radius:8px;cursor:pointer;box-shadow:0 6px 28px rgba(230,57,70,.5);transition:.15s;}
.btn:active{transform:scale(.96);}
/* HUD */
#hud{position:fixed;top:0;left:0;right:0;height:50px;display:none;align-items:center;justify-content:space-between;padding:0 20px;background:rgba(0,0,0,.8);border-bottom:2px solid rgba(230,57,70,.3);z-index:100;}
.hlogo{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:5px;color:#fff;}
.hlogo em{color:#e63946;font-style:normal;}
.hstats{display:flex;gap:26px;}
.hs{text-align:center;}
.hs-l{font-size:.55rem;letter-spacing:3px;color:rgba(255,255,255,.3);text-transform:uppercase;}
.hs-v{font-family:'Bebas Neue',sans-serif;font-size:1.7rem;line-height:1.05;}
#hpts{color:#ffd60a;}
.hearts{display:flex;gap:5px;margin-top:2px;}
.heart{width:16px;height:16px;background:#e63946;clip-path:polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%);transition:.3s;}
.heart.dead{opacity:.15;transform:scale(.6);}
/* FIN */
#s2{background:radial-gradient(ellipse at 50% 30%,#1a0308,#050f05);}
.end-t{font-family:'Bebas Neue',sans-serif;font-size:clamp(3rem,9vw,7rem);color:#e63946;letter-spacing:6px;}
.end-sl{font-size:.85rem;letter-spacing:4px;color:rgba(255,255,255,.3);text-transform:uppercase;margin:10px 0 4px;}
.end-sv{font-family:'Bebas Neue',sans-serif;font-size:clamp(4rem,14vw,10rem);color:#ffd60a;line-height:1;margin-bottom:18px;}
.end-msg{font-size:clamp(.95rem,2.5vw,1.2rem);color:rgba(255,255,255,.65);text-align:center;max-width:440px;line-height:1.7;margin-bottom:36px;}
.end-btns{display:flex;gap:14px;}
.btn2{background:transparent;border:2px solid rgba(255,255,255,.25);color:rgba(255,255,255,.6);font-family:'Bebas Neue',sans-serif;font-size:clamp(1.2rem,3vw,1.7rem);letter-spacing:4px;padding:12px 30px;border-radius:8px;cursor:pointer;transition:.2s;}
.btn2:hover{border-color:#fff;color:#fff;}
</style>
</head>
<body>

<div class="scr" id="s0">
  <div class="logo">MAXI<em>FER</em></div>
  <div class="gtitle">⚡ EXHIBIDOR RUNNER ⚡</div>
  <div class="ibox">
    <p>
      <b>← →</b> Mover &nbsp;|&nbsp; <b>ESPACIO / ↑</b> Saltar<br>
      <b>Z o X</b> Disparar piezas MAXIFER<br><br>
      ¡Destruí los exhibidores antes de que te aplasten!
    </p>
  </div>
  <button class="btn" onclick="startGame()">▶ JUGAR</button>
</div>

<div id="hud">
  <div class="hlogo">MAXI<em>FER</em></div>
  <div class="hstats">
    <div class="hs"><div class="hs-l">Puntos</div><div class="hs-v" id="hpts">0</div></div>
    <div class="hs"><div class="hs-l">Nivel</div><div class="hs-v" id="hniv">1</div></div>
    <div class="hs"><div class="hs-l">Vidas</div>
      <div class="hearts"><div class="heart" id="hv1"></div><div class="heart" id="hv2"></div><div class="heart" id="hv3"></div></div>
    </div>
  </div>
</div>

<canvas id="gc" style="display:none;position:fixed;top:50px;left:0;"></canvas>

<div class="scr off" id="s2">
  <div class="end-t">GAME OVER</div>
  <div class="end-sl">Tu puntaje</div>
  <div class="end-sv" id="escore">0</div>
  <div class="end-msg" id="emsg"></div>
  <div class="end-btns">
    <button class="btn2" onclick="showStart()">INICIO</button>
    <button class="btn" onclick="startGame()">JUGAR DE NUEVO</button>
  </div>
</div>

// ── CANVAS ────────────────────────────────────────────────
const canvas=document.getElementById("gc");
const ctx=canvas.getContext("2d");
const HUD_H=50;
function resize(){canvas.width=window.innerWidth;canvas.height=window.innerHeight-HUD_H;}
resize();
window.addEventListener("resize",resize);

// ── CONSTANTES ────────────────────────────────────────────
const GRAVITY   = 0.6;
const JUMP_V    = -14;
const PW        = 34;  // player width
const PH        = 52;  // player height
const GROUND    = ()=>canvas.height-70;
const AMMO_TYPES= ["oring","resorte","clip"];

// ── ESTADO ────────────────────────────────────────────────
let running=false, score=0, vidas=3, nivel=1;
let rafId=null, lastTs=0, elapsed=0;
let spawnTimer=0, spawnInterval=1800;
let scrollX=0, scrollSpeed=4;
let invincTimer=0;
let bullets=[], enemies=[], particles=[], trees=[];
const keys={};
document.addEventListener("keydown",e=>{keys[e.code]=true;e.preventDefault();},{passive:false});
document.addEventListener("keyup",  e=>{keys[e.code]=false;});

// ── JUGADOR ───────────────────────────────────────────────
const P={
  x:90,y:0,vy:0,onGround:false,
  facing:1,frame:0,shootTimer:0,shooting:false
};

// ── ÁRBOLES ───────────────────────────────────────────────
function initTrees(){
  trees=[];
  for(let i=0;i<8;i++){
    trees.push({
      x: i*(canvas.width/6)+Math.random()*80,
      h: 80+Math.random()*70,
      w: 28+Math.random()*20,
      dark: Math.random()>.5
    });
  }
}

// ── DIBUJAR FONDO BOSQUE ──────────────────────────────────
function drawBG(){
  // Cielo degradado
  const sky=ctx.createLinearGradient(0,0,0,canvas.height*.55);
  sky.addColorStop(0,"#87ceeb"); sky.addColorStop(1,"#c8eeff");
  ctx.fillStyle=sky; ctx.fillRect(0,0,canvas.width,canvas.height);

  // Nubes
  ctx.fillStyle="rgba(255,255,255,.85)";
  const cloudOff=(scrollX*.18)%(canvas.width+200);
  [[120,40,60,22],[320,55,80,18],[550,35,55,16],[780,48,70,20]].forEach(([bx,by,cw,ch])=>{
    const cx2=(bx-cloudOff%650+canvas.width*2)%(canvas.width+200)-100;
    ctx.beginPath(); ctx.ellipse(cx2,by,cw,ch,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx2-cw*.4,by+4,cw*.6,ch*.7,0,0,Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx2+cw*.4,by+4,cw*.6,ch*.7,0,0,Math.PI*2); ctx.fill();
  });

  // Montañas lejanas
  const mOff=(scrollX*.06)%(canvas.width+300);
  ctx.fillStyle="#7bab60";
  for(let i=0;i<5;i++){
    const mx=(i*220-mOff%1100+canvas.width*2)%(canvas.width+300)-150;
    ctx.beginPath(); ctx.moveTo(mx,canvas.height*.55);
    ctx.lineTo(mx+110,canvas.height*.22); ctx.lineTo(mx+220,canvas.height*.55);
    ctx.closePath(); ctx.fill();
  }
  ctx.fillStyle="#98c46a";
  for(let i=0;i<6;i++){
    const mx=(i*180+90-mOff*.7%1080+canvas.width*2)%(canvas.width+300)-150;
    ctx.beginPath(); ctx.moveTo(mx,canvas.height*.58);
    ctx.lineTo(mx+90,canvas.height*.3); ctx.lineTo(mx+180,canvas.height*.58);
    ctx.closePath(); ctx.fill();
  }

  // Pasto fondo
  const grassBack=ctx.createLinearGradient(0,canvas.height*.55,0,GROUND());
  grassBack.addColorStop(0,"#5a9e3a"); grassBack.addColorStop(1,"#3a7a1a");
  ctx.fillStyle=grassBack; ctx.fillRect(0,canvas.height*.55,canvas.width,GROUND()-canvas.height*.55);

  // Árboles (paralax medio)
  const tOff=(scrollX*.5)%(canvas.width+100);
  trees.forEach(t=>{
    const tx=(t.x-tOff+canvas.width*3)%(canvas.width+180)-90;
    // Tronco
    ctx.fillStyle="#6b4a1a";
    ctx.fillRect(tx+t.w/2-5, GROUND()-t.h, 10, t.h);
    // Copa
    ctx.fillStyle= t.dark?"#2a6a10":"#3a8a20";
    ctx.beginPath(); ctx.ellipse(tx+t.w/2, GROUND()-t.h-t.w*.6, t.w*.7, t.w*.9, 0,0,Math.PI*2); ctx.fill();
    ctx.fillStyle= t.dark?"#3a8a20":"#50a830";
    ctx.beginPath(); ctx.ellipse(tx+t.w/2-4, GROUND()-t.h-t.w*.9, t.w*.5, t.w*.7, -.2,0,Math.PI*2); ctx.fill();
  });

  // Suelo principal (pasto)
  const gGrad=ctx.createLinearGradient(0,GROUND(),0,canvas.height);
  gGrad.addColorStop(0,"#4a9e2a"); gGrad.addColorStop(.12,"#3a7a1a"); gGrad.addColorStop(1,"#1a4a08");
  ctx.fillStyle=gGrad; ctx.fillRect(0,GROUND(),canvas.width,canvas.height);

  // Línea de suelo
  ctx.fillStyle="#5dbf30"; ctx.fillRect(0,GROUND(),canvas.width,5);

  // Líneas de perspectiva en el suelo
  ctx.strokeStyle="rgba(90,180,40,.2)"; ctx.lineWidth=1;
  const lOff=(scrollX*1.5)%90;
  for(let x=-90+lOff%90;x<canvas.width+90;x+=90){
    ctx.beginPath(); ctx.moveTo(x,GROUND()+5); ctx.lineTo(x,canvas.height); ctx.stroke();
  }
}

// ── DIBUJAR JUGADOR ───────────────────────────────────────
function drawPlayer(){
  if(invincTimer>0 && Math.floor(invincTimer/5)%2===0) return;
  const px=P.x, py=P.y;
  const moving=keys["ArrowLeft"]||keys["ArrowRight"];
  const fr=Math.floor(P.frame/5)%4;
  const legSwing= moving&&P.onGround ? Math.sin(P.frame*.38)*.35 : 0;

  ctx.save();
  ctx.translate(px+PW/2, py);
  ctx.scale(P.facing,1);

  // Sombra
  ctx.fillStyle="rgba(0,0,0,.2)";
  ctx.beginPath(); ctx.ellipse(0,PH+3,13,4,0,0,Math.PI*2); ctx.fill();

  // Piernas
  [-1,1].forEach((side,si)=>{
    const ang = side*legSwing;
    ctx.save();
    ctx.translate(side*8, PH*.58);
    ctx.rotate(ang);
    // Pantalón
    ctx.fillStyle="#1a3a8a";
    ctx.fillRect(-5,0,10,20);
    // Bota
    ctx.fillStyle="#3a2a0a";
    ctx.beginPath(); ctx.roundRect(-6,18,14,8,3); ctx.fill();
    // Suela
    ctx.fillStyle="#111";
    ctx.beginPath(); ctx.roundRect(-7,24,16,4,2); ctx.fill();
    ctx.restore();
  });

  // Cuerpo chaleco militar
  const bodyG=ctx.createLinearGradient(-14,PH*.18,14,PH*.58);
  bodyG.addColorStop(0,"#5a7a2a"); bodyG.addColorStop(1,"#3a5a18");
  ctx.fillStyle=bodyG;
  ctx.beginPath(); ctx.roundRect(-14,PH*.17,28,PH*.44,5); ctx.fill();
  // Detalle bolsillo
  ctx.fillStyle="rgba(0,0,0,.2)";
  ctx.fillRect(-10,PH*.27,8,10); ctx.fillRect(3,PH*.27,8,10);

  // Brazo izq
  ctx.save();
  ctx.translate(-14,PH*.3);
  ctx.rotate(-legSwing*.5);
  ctx.fillStyle="#5a7a2a"; ctx.fillRect(-7,-3,7,18);
  ctx.restore();

  // Brazo der + arma
  ctx.save();
  ctx.translate(14,PH*.3);
  ctx.rotate(P.shooting?-.25:legSwing*.5);
  ctx.fillStyle="#5a7a2a"; ctx.fillRect(0,-3,7,14);
  // Arma
  ctx.fillStyle="#8a6a18";
  ctx.beginPath(); ctx.roundRect(2,-5,22,9,2); ctx.fill();
  ctx.fillStyle="#555";
  ctx.fillRect(21,-4,14,5);
  ctx.fillStyle="#6a5010"; ctx.fillRect(6,3,8,10);
  ctx.restore();

  // Cabeza
  const headG=ctx.createRadialGradient(-1,-2,2,0,0,14);
  headG.addColorStop(0,"#f0c888"); headG.addColorStop(1,"#c89040");
  ctx.fillStyle=headG;
  ctx.beginPath(); ctx.arc(0,PH*.13,14,0,Math.PI*2); ctx.fill();

  // Ojo
  ctx.fillStyle="#222";
  ctx.beginPath(); ctx.arc(5,PH*.12,3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle="#fff";
  ctx.beginPath(); ctx.arc(6,PH*.11,1.2,0,Math.PI*2); ctx.fill();

  // Casco militar
  ctx.fillStyle="#3a5a18";
  ctx.beginPath(); ctx.ellipse(0,PH*.04,15,10,0,Math.PI,0); ctx.fill();
  ctx.fillStyle="#4a7a20";
  ctx.beginPath(); ctx.ellipse(0,PH*.04,17,5,0,Math.PI,0); ctx.fill();

  ctx.restore();
}

// ── ENEMIGO: exhibidor tal cual, sin piernitas extra ──────
function createEnemy(){
  const imgIdx=Math.floor(Math.random()*exhibImgs.length);
  const hp=1+Math.floor(nivel/3);
  const spd=scrollSpeed*.7+1.5+Math.random()*1.2+nivel*.2;
  // Exhibidores tienen patas ya dibujadas: usamos la imagen completa
  const ew=90+Math.random()*40;
  const eh=ew*1.45; // ratio típico de los exhibidores
  return {
    x:canvas.width+80, y:GROUND()-eh,
    w:ew, h:eh, imgIdx, hp, maxHp:hp, spd,
    frame:0, hitTimer:0,
    vy:0, onGround:true,
    // brinco ocasional
    jumpCd:100+Math.floor(Math.random()*180),
  };
}

function drawEnemy(e){
  ctx.save();
  if(e.hitTimer>0) ctx.filter="brightness(4) saturate(0)";

  const img=exhibImgs[e.imgIdx];
  if(img&&img.complete&&img.naturalWidth>0){
    ctx.drawImage(img,e.x,e.y,e.w,e.h);
  } else {
    // fallback
    ctx.fillStyle="#c8a84b";
    ctx.beginPath(); ctx.roundRect(e.x,e.y,e.w,e.h*.75,6); ctx.fill();
    // piernas fallback
    ctx.fillStyle="#222";
    ctx.fillRect(e.x+e.w*.2,e.y+e.h*.75,e.w*.18,e.h*.2);
    ctx.fillRect(e.x+e.w*.6,e.y+e.h*.75,e.w*.18,e.h*.2);
    ctx.fillStyle="#2255cc";
    ctx.beginPath(); ctx.roundRect(e.x+e.w*.14,e.y+e.h*.93,e.w*.28,e.h*.07,3); ctx.fill();
    ctx.beginPath(); ctx.roundRect(e.x+e.w*.54,e.y+e.h*.93,e.w*.28,e.h*.07,3); ctx.fill();
  }

  // Barra de vida si hp>1
  if(e.maxHp>1){
    const bx=e.x, by2=e.y-10, bw=e.w;
    ctx.filter="none";
    ctx.fillStyle="rgba(0,0,0,.5)"; ctx.fillRect(bx,by2,bw,6);
    ctx.fillStyle="#2dc653"; ctx.fillRect(bx,by2,bw*(e.hp/e.maxHp),6);
    ctx.strokeStyle="rgba(255,255,255,.2)"; ctx.lineWidth=1; ctx.strokeRect(bx,by2,bw,6);
  }
  ctx.filter="none";
  ctx.restore();
}

// ── PROYECTIL: foto real de pieza ─────────────────────────
function drawBullet(b){
  const img=ammoImgs[b.type];
  if(!img||!img.complete) return;
  ctx.save();
  ctx.translate(b.x,b.y);
  ctx.rotate(b.rot);
  ctx.drawImage(img,-b.size/2,-b.size/2,b.size,b.size);
  // Estela
  ctx.globalAlpha=.3;
  ctx.drawImage(img,-b.size/2+8,-b.size/2,b.size*.8,b.size*.8);
  ctx.restore();
}

// ── PARTÍCULAS ────────────────────────────────────────────
function burst(x,y,color,n=14){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, sp=3+Math.random()*7;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,
      life:1,decay:.028+Math.random()*.04,size:3+Math.random()*6,color});
  }
}
function bigBurst(x,y){
  ["#ffd60a","#e63946","#2dc653","#fff","#f4a261","#4af"].forEach(c=>burst(x,y,c,7));
}

// ── UPDATE ────────────────────────────────────────────────
function update(dt){
  scrollX+=scrollSpeed;

  // Jugador movimiento
  if(keys["ArrowLeft"])  P.x=Math.max(10,P.x-6), P.facing=-1;
  if(keys["ArrowRight"]) P.x=Math.min(canvas.width*.42,P.x+6), P.facing=1;

  // Salto
  if((keys["Space"]||keys["ArrowUp"])&&P.onGround){
    P.vy=JUMP_V; P.onGround=false;
    burst(P.x+PW/2,P.y+PH,"#5dbf30",5);
  }

  // Gravedad
  P.vy+=GRAVITY; P.y+=P.vy;
  if(P.y>=GROUND()-PH){ P.y=GROUND()-PH; P.vy=0; P.onGround=true; }

  // Disparo Z/X - proyectil es pieza random
  P.shootTimer--;
  if((keys["KeyZ"]||keys["KeyX"])&&P.shootTimer<=0){
    P.shootTimer=10; P.shooting=true;
    const type=AMMO_TYPES[Math.floor(Math.random()*AMMO_TYPES.length)];
    bullets.push({
      x:P.x+PW+(P.facing>0?20:0), y:P.y+PH*.35,
      vx:16*P.facing, type, size:28, rot:0, rotSpd:.15*P.facing
    });
  } else if(P.shootTimer<0) P.shooting=false;

  P.frame++;
  if(invincTimer>0) invincTimer--;

  // Balas
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];
    b.x+=b.vx; b.rot+=b.rotSpd;
    if(b.x<-30||b.x>canvas.width+30){bullets.splice(i,1);continue;}
    let hit=false;
    for(let j=enemies.length-1;j>=0;j--){
      const e=enemies[j];
      if(b.x>e.x&&b.x<e.x+e.w&&b.y>e.y&&b.y<e.y+e.h*.8){
        e.hp--; e.hitTimer=8;
        burst(b.x,b.y,"#ffd60a",8);
        bullets.splice(i,1); hit=true;
        if(e.hp<=0){
          bigBurst(e.x+e.w/2,e.y+e.h/2);
          score+=10+nivel*5; updateHUD();
          enemies.splice(j,1);
        }
        break;
      }
    }
    if(hit) continue;
  }

  // Spawn enemigos
  spawnTimer+=dt;
  if(spawnTimer>=spawnInterval){
    spawnTimer=0;
    enemies.push(createEnemy());
    if(nivel>=3&&Math.random()<.35){
      setTimeout(()=>{ if(running) enemies.push(createEnemy()); },700);
    }
    spawnInterval=Math.max(700,1800-nivel*120);
  }

  // Update enemigos
  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];
    e.x-=e.spd; e.frame++;
    if(e.hitTimer>0) e.hitTimer--;

    // Brinco
    e.jumpCd--;
    if(e.jumpCd<=0&&e.onGround){ e.vy=JUMP_V*.65; e.onGround=false; e.jumpCd=100+Math.floor(Math.random()*180); }
    e.vy+=GRAVITY*.75; e.y+=e.vy;
    const eg=GROUND()-e.h;
    if(e.y>=eg){ e.y=eg; e.vy=0; e.onGround=true; }

    if(e.x+e.w<-30){ enemies.splice(i,1); continue; }

    // Colisión jugador
    if(invincTimer<=0){
      if(P.x+PW>e.x&&P.x<e.x+e.w&&P.y+PH>e.y&&P.y<e.y+e.h*.8){
        vidas--; invincTimer=90;
        burst(P.x+PW/2,P.y+PH/2,"#e63946",16);
        updateHUD();
        if(vidas<=0){ setTimeout(endGame,400); return; }
      }
    }
  }

  // Nivel
  elapsed+=dt;
  if(elapsed>25000){ nivel++; elapsed=0; scrollSpeed=Math.min(10,scrollSpeed+.5); updateHUD(); }

  // Partículas
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy; p.vy+=.3; p.life-=p.decay;
    if(p.life<=0) particles.splice(i,1);
  }
}

function draw(){
  drawBG();
  particles.forEach(p=>{
    ctx.beginPath(); ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);
    ctx.fillStyle=p.color; ctx.globalAlpha=p.life; ctx.fill(); ctx.globalAlpha=1;
  });
  enemies.forEach(drawEnemy);
  bullets.forEach(drawBullet);
  drawPlayer();
  // Hint controles
  ctx.fillStyle="rgba(0,0,0,.35)";
  ctx.fillRect(0,canvas.height-22,canvas.width,22);
  ctx.fillStyle="rgba(255,255,255,.5)";
  ctx.font="12px 'Barlow Condensed'";
  ctx.textAlign="center";
  ctx.fillText("← → MOVER  |  ESPACIO / ↑ SALTAR  |  Z / X DISPARAR",canvas.width/2,canvas.height-6);
}

function loop(ts){
  if(!running) return;
  const dt=ts-lastTs; lastTs=ts;
  update(dt); draw();
  rafId=requestAnimationFrame(loop);
}

function updateHUD(){
  document.getElementById("hpts").textContent=score;
  document.getElementById("hniv").textContent=nivel;
  for(let i=1;i<=3;i++)
    document.getElementById(`hv${i}`).className="heart"+(i>vidas?" dead":"");
}

function showStart(){
  document.getElementById("s0").classList.remove("off");
  document.getElementById("s2").classList.add("off");
  canvas.style.display="none";
  document.getElementById("hud").style.display="none";
}

function startGame(){
  score=0;vidas=3;nivel=1;elapsed=0;scrollX=0;scrollSpeed=4;
  spawnTimer=0;spawnInterval=1800;invincTimer=0;
  bullets=[];enemies=[];particles=[];
  P.x=90;P.y=GROUND()-PH;P.vy=0;P.onGround=true;
  P.facing=1;P.frame=0;P.shootTimer=0;P.shooting=false;
  resize();initTrees();
  running=true;
  document.getElementById("s0").classList.add("off");
  document.getElementById("s2").classList.add("off");
  document.getElementById("hud").style.display="flex";
  canvas.style.display="block";
  updateHUD();
  if(rafId) cancelAnimationFrame(rafId);
  rafId=requestAnimationFrame(ts=>{lastTs=ts;loop(ts);});
}

function endGame(){
  running=false;
  if(rafId) cancelAnimationFrame(rafId);
  canvas.style.display="none";
  document.getElementById("hud").style.display="none";
  document.getElementById("escore").textContent=score;
  const msg=
    score>=500?"¡HÉROE MAXIFER! Limpiaste el bosque de exhibidores. 🏆":
    score>=200?"¡Muy bien! Los exhibidores no te pudieron con vos.":
    score>=80 ?"¡Buen intento! La próxima vas a destruirlos a todos.":
               "¡Gracias por jugar! Pasá por el stand MAXIFER.";
  document.getElementById("emsg").textContent=msg;
  document.getElementById("s2").classList.remove("off");
}
</script>
