<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MAXIFER Stand</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; width:100vw; height:100vh; overflow:hidden; cursor:none; }

  #particles-canvas { position:fixed; inset:0; z-index:0; }
  #slideshow { position:fixed; inset:0; z-index:1; }

  .slide {
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    opacity:0; pointer-events:none;
  }
  .slide.active { pointer-events:auto; }
  .slide img {
    max-height:90vh; max-width:88vw;
    object-fit:contain;
    filter:drop-shadow(0 0 40px rgba(255,255,255,0.15));
    will-change:transform; transform-origin:center center;
  }

  .vslide {
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    opacity:0; pointer-events:none; background:#000;
  }
  .vslide.active { pointer-events:auto; }
  .vslide video { max-height:100vh; max-width:100vw; object-fit:contain; }

  #progress-bar {
    position:fixed; bottom:0; left:0; height:4px; width:0%;
    background:linear-gradient(90deg,#e63946,#f4a261,#e63946);
    z-index:10;
  }
  #counter {
    position:fixed; top:24px; right:30px;
    color:rgba(255,255,255,0.35); font-family:'Bebas Neue',sans-serif;
    font-size:1.1rem; letter-spacing:3px; z-index:10;
  }
  #logo {
    position:fixed; bottom:20px; left:30px; color:white;
    font-family:'Bebas Neue',sans-serif; font-size:2rem;
    letter-spacing:6px; opacity:0.5; z-index:10;
  }
  #logo span { color:#e63946; }
  #flash { position:fixed; inset:0; background:white; z-index:5; opacity:0; pointer-events:none; }
</style>
</head>
<body>
<canvas id="particles-canvas"></canvas>
<div id="slideshow"></div>
<div id="progress-bar"></div>
<div id="counter">01</div>
<div id="logo">MAXI<span>FER</span></div>
<div id="flash"></div>

<script>
const BASE = "https://raw.githubusercontent.com/maxifercotizador/Flyers-Catalogo/main/img/";

const PHOTOS = [
  "file_0000000071d471f5abc6187948cdf5e1.png",
  "file_000000007d5071f59c008710c038ad5e.png",
  "file_0000000072e071f5aff3d78a3e3958b1.png",
  "file_00000000a0e4720eac7fc327b43f1ba8.png",
  "file_00000000a2d071f58d546a77100ba608.png",
  "file_00000000c4ac720eb5f46bb421088f19.png",
  "1774141342841.png",
  "1774141878241.png",
  "a_3d_rendered_digital_illustration_features_an_ant-1.png",
  "1774141956795.png",
  "1774141816193.png",
  "1774142774002.png",
  "1774142613942.png",
  "a_3d_rendered_digital_illustration_features_an_ant-3.png",
  "exhibidor_arandelas_de_inyeccion.png",
  "file_000000001ed471f5a1240b29ce8cc6ef.png",
  "file_0000000003034720e8eef2606a52079d5.png",
  "file_0000000000706871f5a7c0379461a031e9.png"
].map(n => BASE + n);

const VIDEOS = [
  "1770512319593.mp4",
  "sora-s_69bf7aad07788191af2889940d1c416c.mp4",
  "sora-s_69bfe0b555ac8191b8437264f99b2dfb.mp4",
  "sora-s_69bfeba924e88191b44e2a24afdca398.mp4"
].map(n => BASE + n);

// ── PARTÍCULAS ──
const canvas = document.getElementById("particles-canvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
const particles = Array.from({length:55}, () => ({
  x: Math.random()*canvas.width, y: Math.random()*canvas.height,
  r: Math.random()*2.5+0.5,
  dx:(Math.random()-.5)*.4, dy:(Math.random()-.5)*.4,
  alpha:Math.random()*.5+.1,
  color:Math.random()>.7?"#e63946":"#ffffff"
}));
function drawParticles() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  particles.forEach(p => {
    p.x+=p.dx; p.y+=p.dy;
    if(p.x<0)p.x=canvas.width; if(p.x>canvas.width)p.x=0;
    if(p.y<0)p.y=canvas.height; if(p.y>canvas.height)p.y=0;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=p.color; ctx.globalAlpha=p.alpha; ctx.fill();
  });
  ctx.globalAlpha=1;
  requestAnimationFrame(drawParticles);
}
drawParticles();

// ── KEYFRAMES ──
const st = document.createElement("style");
st.textContent = `
  @keyframes kb-zi  { 0%{transform:scale(.88) translate(0,0)} 100%{transform:scale(1.08) translate(-2%,-1%)} }
  @keyframes kb-zo  { 0%{transform:scale(1.1) translate(-2%,2%)} 100%{transform:scale(.9) translate(1%,-1%)} }
  @keyframes kb-l   { 0%{transform:scale(1.05) translateX(4%)} 100%{transform:scale(1.05) translateX(-4%)} }
  @keyframes kb-r   { 0%{transform:scale(1.05) translateX(-4%)} 100%{transform:scale(1.05) translateX(4%)} }
  @keyframes sw-l   { 0%{transform:translateX(0) rotate(0deg) scale(.98)} 25%{transform:translateX(-3%) rotate(-1.5deg) scale(1)} 75%{transform:translateX(3%) rotate(1.5deg) scale(1.02)} 100%{transform:translateX(0) rotate(0deg) scale(.98)} }
  @keyframes sw-r   { 0%{transform:translateX(0) rotate(0deg) scale(1)} 30%{transform:translateX(3%) rotate(1deg) scale(1.03)} 70%{transform:translateX(-2%) rotate(-1deg) scale(1.01)} 100%{transform:translateX(0) rotate(0deg) scale(1)} }
  @keyframes fl-u   { 0%{transform:translateY(0) scale(1)} 50%{transform:translateY(-4%) scale(1.04)} 100%{transform:translateY(0) scale(1)} }
  @keyframes fl-d   { 0%{transform:translateY(-3%) scale(1.03)} 50%{transform:translateY(3%) scale(.98)} 100%{transform:translateY(-3%) scale(1.03)} }
  @keyframes ent-r  { from{opacity:0;transform:translateX(8%) scale(.96)} to{opacity:1;transform:translateX(0) scale(1)} }
  @keyframes ent-l  { from{opacity:0;transform:translateX(-8%) scale(.96)} to{opacity:1;transform:translateX(0) scale(1)} }
  @keyframes ent-u  { from{opacity:0;transform:translateY(6%) scale(.97)} to{opacity:1;transform:translateY(0) scale(1)} }
  @keyframes ent-z  { from{opacity:0;transform:scale(.82)} to{opacity:1;transform:scale(1)} }
  @keyframes ent-f  { from{opacity:0} to{opacity:1} }
  @keyframes ex-l   { from{opacity:1;transform:translateX(0)} to{opacity:0;transform:translateX(-6%)} }
  @keyframes ex-r   { from{opacity:1;transform:translateX(0)} to{opacity:0;transform:translateX(6%)} }
  @keyframes ex-zo  { from{opacity:1;transform:scale(1)} to{opacity:0;transform:scale(1.12)} }
  @keyframes ex-zi  { from{opacity:1;transform:scale(1)} to{opacity:0;transform:scale(.88)} }
  @keyframes ex-f   { from{opacity:1} to{opacity:0} }
`;
document.head.appendChild(st);

const slideshow = document.getElementById("slideshow");
const progressBar = document.getElementById("progress-bar");
const counter = document.getElementById("counter");
const flash = document.getElementById("flash");

const PHOTO_DUR = 4500;
const TRANS = 650;
const imgAnims  = ["kb-zi","kb-zo","kb-l","kb-r","sw-l","sw-r","fl-u","fl-d"];
const entrances = ["ent-r","ent-l","ent-u","ent-z","ent-f"];
const exits     = ["ex-l","ex-r","ex-zo","ex-zi","ex-f"];
const pick = a => a[Math.floor(Math.random()*a.length)];

// Crear foto slides
const photoEls = PHOTOS.map(src => {
  const div = document.createElement("div"); div.className="slide";
  const img = document.createElement("img"); img.src=src;
  div.appendChild(img); slideshow.appendChild(div);
  return {el:div, img, type:"photo"};
});

// Crear video slides
const videoEls = VIDEOS.map(src => {
  const div = document.createElement("div"); div.className="vslide";
  const vid = document.createElement("video");
  vid.src=src; vid.muted=true; vid.playsInline=true; vid.preload="auto";
  div.appendChild(vid); slideshow.appendChild(div);
  return {el:div, vid, type:"video"};
});

function buildPlaylist() {
  const photos = [...Array(18).keys()].sort(()=>Math.random()-.5);
  const vids   = [...Array(4).keys()].sort(()=>Math.random()-.5);
  const list=[]; let pi=0,vi=0;
  while(pi<photos.length) {
    for(let k=0;k<5&&pi<photos.length;k++,pi++) list.push({type:"photo",idx:photos[pi]});
    list.push({type:"video",idx:vids[vi%4]}); vi++;
  }
  return list;
}

let playlist=buildPlaylist(), cursor=0;
let progressRAF=null, progressStart=null;

function flashFx() {
  flash.style.transition="none"; flash.style.opacity=".2";
  setTimeout(()=>{ flash.style.transition="opacity 400ms ease"; flash.style.opacity="0"; },80);
}

function startProgress(dur) {
  progressStart=null;
  if(progressRAF) cancelAnimationFrame(progressRAF);
  function step(ts) {
    if(!progressStart) progressStart=ts;
    const pct=Math.min(((ts-progressStart)/dur)*100,100);
    progressBar.style.width=pct+"%";
    if(pct<100) progressRAF=requestAnimationFrame(step);
  }
  progressRAF=requestAnimationFrame(step);
}

function hideItem(item,cb) {
  const el=item.el;
  el.style.animation=`${pick(exits)} ${TRANS}ms ease-in forwards`;
  setTimeout(()=>{
    el.style.opacity="0"; el.style.animation="none"; el.classList.remove("active");
    if(item.type==="video") item.vid.pause();
    cb();
  }, TRANS);
}

function showPhoto(item) {
  const {el,img}=item;
  img.style.animation="none"; img.offsetHeight;
  img.style.animation=`${pick(imgAnims)} ${PHOTO_DUR+TRANS}ms ease-in-out forwards`;
  el.style.animation="none"; el.offsetHeight;
  el.style.animation=`${pick(entrances)} ${TRANS}ms cubic-bezier(.25,.46,.45,.94) forwards`;
  el.style.opacity="1"; el.classList.add("active");
}

function showVideo(item) {
  const {el,vid}=item;
  el.style.animation=`ent-f ${TRANS}ms ease forwards`;
  el.style.opacity="1"; el.classList.add("active");
  vid.currentTime=0; vid.play().catch(()=>{});
}

function advance() {
  if(cursor>=playlist.length){ playlist=buildPlaylist(); cursor=0; }
  const entry=playlist[cursor];
  counter.textContent=String(cursor+1).padStart(2,"0")+" / "+playlist.length;
  flashFx();

  if(entry.type==="photo") {
    const item=photoEls[entry.idx];
    showPhoto(item); startProgress(PHOTO_DUR);
    setTimeout(()=>hideItem(item,()=>{ cursor++; advance(); }), PHOTO_DUR);
  } else {
    const item=videoEls[entry.idx];
    showVideo(item); progressBar.style.width="0%";
    const vid=item.vid;
    function onEnded(){ vid.removeEventListener("ended",onEnded); hideItem(item,()=>{ cursor++; advance(); }); }
    vid.addEventListener("ended",onEnded);
    setTimeout(()=>{ vid.removeEventListener("ended",onEnded); hideItem(item,()=>{ cursor++; advance(); }); },30000);
  }
}

advance();
window.addEventListener("resize",()=>{ canvas.width=window.innerWidth; canvas.height=window.innerHeight; });
</script>
</body>
</html>
